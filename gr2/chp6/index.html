<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Keeping Your Surroundings Clean</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  overflow-x:hidden;
}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#e8f5e9,#e3f2fd,#fff8e1);
  color:#263238;
}

.bg span{
  position:fixed;
  top:-30px;
  font-size:22px;
  opacity:.22;
  animation:float 14s linear infinite;
  z-index:0;
}

.bg span:nth-child(1){left:8%;animation-delay:0s}
.bg span:nth-child(2){left:28%;animation-delay:3s}
.bg span:nth-child(3){left:52%;animation-delay:6s}
.bg span:nth-child(4){left:76%;animation-delay:2s}
.bg span:nth-child(5){left:92%;animation-delay:5s}

@keyframes float{
  from{transform:translateY(-40px) rotate(0deg)}
  to{transform:translateY(110vh) rotate(180deg)}
}

.screen{
  display:none;
  min-height:100vh;
  padding:16px;
  position:relative;
  z-index:1;
}

.active{
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:92vw;
  max-width:760px;
  background:rgba(255,255,255,.96);
  border-radius:26px;
  padding:22px;
  box-shadow:0 10px 26px rgba(0,0,0,.13);
  text-align:center;
}

.logo{
  width:180px;
  max-width:70%;
  height:auto;
  margin-bottom:18px;
}

h1{
  color:#2e7d32;
  margin:10px 0;
  font-size:36px;
  line-height:1.15;
}

h2{
  color:#1565c0;
  margin:8px 0;
  font-size:24px;
}

p{
  font-size:18px;
  line-height:1.45;
}

button{
  border:0;
  border-radius:18px;
  padding:15px 24px;
  margin:8px;
  font-size:18px;
  font-weight:bold;
  background:#ffca28;
  color:#263238;
  cursor:pointer;
  box-shadow:0 5px 0 #f9a825;
  min-height:54px;
}

button:active{
  transform:translateY(3px);
  box-shadow:0 2px 0 #f9a825;
}

.topbar{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:14px;
  font-weight:bold;
}

.badge{
  background:#e3f2fd;
  border-radius:16px;
  padding:10px 8px;
  text-align:center;
  font-size:16px;
}

.timer{background:#fff3e0}

.progress-wrap{
  width:100%;
  height:12px;
  background:#e0e0e0;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:16px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#66bb6a;
  transition:.3s;
}

.question-image-container{
  text-align:center;
  margin:10px auto 14px;
  min-height:0;
}

.question-image-container img{
  display:block;
  width:100%;
  max-width:280px;
  max-height:180px;
  object-fit:contain;
  margin:0 auto;
  border-radius:18px;
}

.question{
  font-size:24px;
  line-height:1.4;
  font-weight:bold;
  margin:22px 0;
}

.options{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.option{
  background:#f1f8e9;
  border:2px solid #c5e1a5;
  border-radius:18px;
  padding:18px;
  font-size:20px;
  min-height:70px;
  display:flex;
  align-items:center;
  cursor:pointer;
  text-align:left;
  line-height:1.3;
}

.option:hover{background:#e8f5e9}

.correct{
  background:#c8f7c5!important;
  border-color:#2e7d32!important;
  transform:scale(1.01);
}

.wrong{
  background:#ffcdd2!important;
  border-color:#c62828!important;
}

.feedback{
  min-height:62px;
  margin-top:16px;
  font-size:18px;
  font-weight:bold;
}

.explain{
  font-size:16px;
  font-weight:normal;
  margin-top:6px;
  line-height:1.4;
}

.hidden{display:none}

.confetti{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:3;
}

.star{
  position:absolute;
  font-size:24px;
  animation:pop 900ms ease-out forwards;
}

@keyframes pop{
  0%{transform:scale(.3) translateY(0);opacity:1}
  100%{transform:scale(1.4) translateY(-120px);opacity:0}
}

.cross{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:88px;
  color:#e53935;
  opacity:0;
  z-index:4;
  animation:crossfade 700ms ease-out;
}

@keyframes crossfade{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
  40%{opacity:.85}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.2)}
}

.finalbox{
  background:#fff8e1;
  border:2px dashed #ffb300;
  border-radius:20px;
  padding:16px;
  margin-top:16px;
}

.small{
  font-size:15px;
  color:#546e7a;
}

@media(max-width:520px){
  .screen{padding:10px}
  .card{width:94vw;padding:16px;border-radius:22px}
  h1{font-size:28px}
  h2{font-size:20px}
  p{font-size:16px}
  .topbar{grid-template-columns:1fr;gap:6px}
  .badge{font-size:15px;padding:9px 8px}
  .question{font-size:20px;margin:18px 0}
  .question-image-container img{max-width:260px;max-height:170px}
  .option{font-size:18px;padding:16px;min-height:64px}
  button{width:100%;font-size:18px;padding:15px 18px}
  .feedback{font-size:17px}
  .explain{font-size:15px}
}

@media(max-height:520px){
  .active{align-items:flex-start}
  .screen{padding-top:10px}
  .card{margin:8px 0}
  .question{margin:14px 0}
  .option{min-height:54px;padding:13px}
}

@media(prefers-reduced-motion:reduce){
  .bg span,.star,.cross{animation:none}
}
</style>
</head>

<body>

<div class="bg">
  <span>⭐</span>
  <span>🌱</span>
  <span>⭐</span>
  <span>🧹</span>
  <span>⭐</span>
</div>

<div id="splash" class="screen active">
  <div class="card">
    <img src="assets/innovine-logo.png" class="logo" alt="Innovine Logo" loading="eager" decoding="async">
    <h2>Loading your game...</h2>
  </div>
</div>

<div id="intro" class="screen">
  <div class="card">
    <h1>Keeping Your Surroundings Clean</h1>
    <h2>Grade 2 EVS</h2>
    <p>Choose the best answer. You get one retry after a wrong answer.</p>
    <p>Each question has a 60-second timer.</p>
    <button onclick="startGame()">Start Game</button>
  </div>
</div>

<div id="quiz" class="screen">
  <div class="card">
    <div class="topbar">
      <div class="badge" id="qCount">Question 1/20</div>
      <div class="badge">Score: <span id="score">0</span></div>
      <div class="badge timer">Time: <span id="time">60</span>s</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="questionImageContainer" class="question-image-container"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button id="nextBtn" class="hidden" onclick="nextQuestion()">Next</button>
  </div>
</div>


<div id="result" class="screen">
  <div class="card">
    <h1>Great Work!</h1>
    <h2>Your Score: <span id="finalScore"></span>/20</h2>
    <p id="resultMsg"></p>
    <button onclick="location.reload()">Play Again</button>
  </div>
</div>

<div class="confetti" id="confetti"></div>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/clapping.mp3" preload="auto"></audio>

<script>
const questions=[
{q:"Look at the picture. How are the children helping the environment?",image:"assets/ch6_q1.png",o:["By cleaning the area and putting waste in a dustbin","By making the place dirty","By cutting plants","By wasting water"],a:0,e:"Cleaning public places helps keep the environment clean and healthy."},

{q:"A school playground is full of litter. Why should students help keep it clean?",o:["To stay healthy and enjoy a cleaner place","To attract flies and mosquitoes","To create more waste","To make the playground smaller"],a:0,e:"Clean surroundings help us stay healthy and safe."},

{q:"You finish eating a snack during recess. What is the responsible thing to do with the wrapper?",o:["Put it in the dustbin","Throw it near a tree","Leave it on the bench","Drop it in the playground"],a:0,e:"Waste should always be thrown in a dustbin."},

{q:"Aarav wants to help keep his neighbourhood clean. Which action should he choose?",o:["Using a dustbin and planting trees","Throwing waste on roads","Burning plastic waste","Wasting water every day"],a:0,e:"Using dustbins and planting trees are environment-friendly habits."},

{q:"Garbage is left uncovered near houses. What is most likely to happen?",o:["Flies and mosquitoes may gather there","The air becomes fresher","More flowers will grow","The area becomes cleaner"],a:0,e:"Garbage attracts insects that can spread diseases."},

{q:"A road has many vehicles releasing smoke every day. What problem may increase in that area?",o:["Air pollution","Water pollution","Soil pollution only","Cleaner air"],a:0,e:"Vehicle smoke contributes to air pollution."},

{q:"You notice paper pieces lying near your classroom. What should you do?",o:["Pick them up and throw them in a dustbin","Ignore them","Kick them away","Throw more paper nearby"],a:0,e:"Using a dustbin helps keep the school clean."},

{q:"A child throws plastic waste into a lake. Why is this harmful?",o:["It pollutes water and harms living things","It makes water sweeter","It helps fish grow faster","It keeps water cleaner"],a:0,e:"Garbage makes water dirty and unsafe for living things."},

{q:"Rohan sees different children helping in the school garden. Which child is doing the wrong thing?",o:["The child throwing waste on the road","The child planting trees","The child using a dustbin","The child helping to clean the area"],a:0,e:"Waste should not be thrown on roads."},

{q:"A family goes shopping every week. Which bag is a better choice for the environment?",o:["Cloth bag","Plastic bag","Food wrapper","Disposable packet"],a:0,e:"Cloth bags can be reused many times."},

{q:"Many trees are cut down in one area. How might this affect the environment?",o:["There may be less clean air","There will be more shade","More birds will come","Pollution will reduce"],a:0,e:"Trees help clean the air and provide oxygen."},

{q:"Look at the picture. What are the children doing to help the environment?",image:"assets/ch6_q12.png",o:["Planting and watering young plants","Cutting trees","Throwing waste on the ground","Burning leaves"],a:0,e:"The children are planting and watering saplings."},

{q:"Your friend's house is only a short distance away. Why is walking a good choice?",o:["It reduces pollution from vehicles","It creates more smoke","It wastes fuel","It makes roads dirtier"],a:0,e:"Walking short distances helps reduce pollution."},

{q:"Look at the picture. Why is the green dustbin a better choice than the blue one?",image:"assets/ch6_q14.png",o:["Its lid helps keep flies and germs away","It can hold more garbage","It is a brighter colour","It attracts insects less because it is green"],a:0,e:"Covered dustbins help prevent the spread of germs and keep surroundings cleaner."},

{q:"While walking to class, Meera finishes her snack. What should she do with the wrapper?",o:["Put it in a covered dustbin","Drop it on the floor","Leave it on a desk","Throw it in the playground"],a:0,e:"Waste should always be thrown in a dustbin."},

{q:"You see litter near your school gate. What is the best action?",o:["Put it in a dustbin","Walk away","Throw more litter","Play around it"],a:0,e:"Keeping public places clean is everyone's responsibility."},

{q:"Someone is burning plastic near your house. Why is this harmful?",o:["It causes air pollution","It makes the air fresh","It helps plants grow","It cleans the surroundings"],a:0,e:"Burning plastic releases harmful smoke into the air."},

{q:"During lunch break, one child spits on the ground while others use the dustbin and keep the area clean. Which action is unhealthy?",o:["Spitting in open areas","Using a covered dustbin","Planting trees","Keeping the school clean"],a:0,e:"Spitting in open places can spread germs."},

{q:"Your pet dog dirties part of the garden. What should you do?",o:["Clean the area properly","Ignore it","Leave it there","Move to another place"],a:0,e:"Cleaning up after pets helps keep places hygienic."},

{q:"Two families live in different areas. One area is clean and green, while the other has litter everywhere. Which area is healthier to live in?",o:["The clean and green area","The littered area","Both are the same","Neither area"],a:0,e:"Clean surroundings help people stay healthy and happy."}
]

let current=0;
let score=0;
let attempts=0;
let timer;
let timeLeft=60;
let locked=false;

const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");

setTimeout(function(){
  showScreen("intro");
},5000);

function showScreen(id){
  const screens=document.querySelectorAll(".screen");
  for(let i=0;i<screens.length;i++){
    screens[i].classList.remove("active");
  }
  document.getElementById(id).classList.add("active");
}

function startGame(){
  score=0;
  current=0;
  showScreen("quiz");
  loadQuestion();
}

function loadQuestion(){
  locked=false;
  attempts=0;
  clearInterval(timer);
  timeLeft=60;

  const q=questions[current];

  document.getElementById("time").textContent=timeLeft;
  document.getElementById("score").textContent=score;
  document.getElementById("qCount").textContent="Question "+(current+1)+"/"+questions.length;
  document.getElementById("question").textContent=q.q;
  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").classList.add("hidden");

  const imageContainer=document.getElementById("questionImageContainer");
  imageContainer.innerHTML="";

  if(q.image){
    const img=document.createElement("img");
    img.src=q.image;
    img.alt="Question image";
    img.loading="eager";
    img.decoding="async";
    imageContainer.appendChild(img);
  }

  const progress=((current)/questions.length)*100;
  document.getElementById("progressBar").style.width=progress+"%";

  const box=document.getElementById("options");
  box.innerHTML="";

  for(let i=0;i<q.o.length;i++){
    const div=document.createElement("div");
    div.className="option";
    div.textContent=q.o[i];
    div.onclick=function(){
      checkAnswer(i,div);
    };
    box.appendChild(div);
  }

  startTimer();
}

function startTimer(){
  timer=setInterval(function(){
    timeLeft--;
    document.getElementById("time").textContent=timeLeft;

    if(timeLeft<=0){
      clearInterval(timer);
      showAnswer("Time is up!");
    }
  },1000);
}

function checkAnswer(i,el){
  if(locked){return}

  const q=questions[current];

  if(i===q.a){
    locked=true;
    clearInterval(timer);
    score++;
    document.getElementById("score").textContent=score;
    el.classList.add("correct");
    document.getElementById("feedback").innerHTML="Correct!<div class='explain'>"+q.e+"</div>";

    playSound(correctSound);
    setTimeout(function(){playSound(clapSound)},250);

    makeConfetti();
    document.getElementById("nextBtn").classList.remove("hidden");
  }else{
    attempts++;
    el.classList.add("wrong");
    showCross();
    playSound(wrongSound);

    if(attempts===1){
      document.getElementById("feedback").innerHTML="Try once more.";
      el.onclick=null;
    }else{
      showAnswer("Not quite.");
    }
  }
}

function showAnswer(msg){
  locked=true;
  clearInterval(timer);

  const q=questions[current];
  const options=document.querySelectorAll(".option");

  for(let i=0;i<options.length;i++){
    options[i].onclick=null;
    if(i===q.a){options[i].classList.add("correct")}
  }

  document.getElementById("feedback").innerHTML=
    msg+"<div class='explain'>Correct answer: <b>"+q.o[q.a]+"</b><br>"+q.e+"</div>";

  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion(){
  current++;
  if(current<questions.length){
    loadQuestion();
  }else{
    document.getElementById("progressBar").style.width="100%";
    showResult();
  }
}

function showResult(){
  showScreen("result");
  document.getElementById("finalScore").textContent=score;

  let msg="Good effort! Keep practising cleanliness and pollution control.";

  if(score>=18){
    msg="Excellent! You understand clean surroundings, pollution, and healthy habits very well.";
  }else if(score>=14){
    msg="Well done! A little more practice will make it even better.";
  }

  document.getElementById("resultMsg").textContent=msg;
}

function makeConfetti(){
  const box=document.getElementById("confetti");

  for(let i=0;i<18;i++){
    const s=document.createElement("div");
    s.className="star";
    s.textContent="⭐";
    s.style.left=Math.random()*100+"vw";
    s.style.top=(55+Math.random()*25)+"vh";
    box.appendChild(s);

    setTimeout(function(){s.remove()},900);
  }
}

function showCross(){
  const x=document.createElement("div");
  x.className="cross";
  x.textContent="✕";
  document.body.appendChild(x);

  setTimeout(function(){x.remove()},700);
}

function playSound(sound){
  if(!sound){return}

  try{
    sound.currentTime=0;
    const playPromise=sound.play();

    if(playPromise!==undefined){
      playPromise.catch(function(){});
    }
  }catch(error){}
}
</script>

</body>
</html>
