<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Animal Kingdom</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  overflow-x:hidden;
}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#fff8e1,#e8f5e9,#e3f2fd);
  color:#263238;
}

.bg span{
  position:fixed;
  top:-30px;
  font-size:22px;
  opacity:.22;
  animation:float 14s linear infinite;
  z-index:0;
}

.bg span:nth-child(1){left:8%;animation-delay:0s}
.bg span:nth-child(2){left:28%;animation-delay:3s}
.bg span:nth-child(3){left:52%;animation-delay:6s}
.bg span:nth-child(4){left:76%;animation-delay:2s}
.bg span:nth-child(5){left:92%;animation-delay:5s}

@keyframes float{
  from{transform:translateY(-40px) rotate(0deg)}
  to{transform:translateY(110vh) rotate(180deg)}
}

.screen{
  display:none;
  min-height:100vh;
  padding:16px;
  position:relative;
  z-index:1;
}

.active{
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:92vw;
  max-width:760px;
  background:rgba(255,255,255,.96);
  border-radius:26px;
  padding:22px;
  box-shadow:0 10px 26px rgba(0,0,0,.13);
  text-align:center;
}

.logo{
  width:180px;
  max-width:70%;
  height:auto;
  margin-bottom:18px;
}

h1{
  color:#5d4037;
  margin:10px 0;
  font-size:36px;
  line-height:1.15;
}

h2{
  color:#1565c0;
  margin:8px 0;
  font-size:24px;
}

p{
  font-size:18px;
  line-height:1.45;
}

button{
  border:0;
  border-radius:18px;
  padding:15px 24px;
  margin:8px;
  font-size:18px;
  font-weight:bold;
  background:#ffca28;
  color:#263238;
  cursor:pointer;
  box-shadow:0 5px 0 #f9a825;
  min-height:54px;
}

button:active{
  transform:translateY(3px);
  box-shadow:0 2px 0 #f9a825;
}

.topbar{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:14px;
  font-weight:bold;
}

.badge{
  background:#e3f2fd;
  border-radius:16px;
  padding:10px 8px;
  text-align:center;
  font-size:16px;
}

.timer{background:#fff3e0}

.progress-wrap{
  width:100%;
  height:12px;
  background:#e0e0e0;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:16px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#66bb6a;
  transition:.3s;
}

.question-image-container{
  text-align:center;
  margin:10px auto 14px;
  min-height:0;
}

.question-image-container img{
  display:block;
  width:100%;
  max-width:280px;
  max-height:180px;
  object-fit:contain;
  margin:0 auto;
  border-radius:18px;
}

.question{
  font-size:24px;
  line-height:1.4;
  font-weight:bold;
  margin:22px 0;
}

.options{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.option{
  background:#f1f8e9;
  border:2px solid #c5e1a5;
  border-radius:18px;
  padding:18px;
  font-size:20px;
  min-height:70px;
  display:flex;
  align-items:center;
  cursor:pointer;
  text-align:left;
  line-height:1.3;
}

.option:hover{background:#e8f5e9}

.correct{
  background:#c8f7c5!important;
  border-color:#2e7d32!important;
  transform:scale(1.01);
}

.wrong{
  background:#ffcdd2!important;
  border-color:#c62828!important;
}

.feedback{
  min-height:62px;
  margin-top:16px;
  font-size:18px;
  font-weight:bold;
}

.explain{
  font-size:16px;
  font-weight:normal;
  margin-top:6px;
  line-height:1.4;
}

.hidden{display:none}

.confetti{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:3;
}

.star{
  position:absolute;
  font-size:24px;
  animation:pop 900ms ease-out forwards;
}

@keyframes pop{
  0%{transform:scale(.3) translateY(0);opacity:1}
  100%{transform:scale(1.4) translateY(-120px);opacity:0}
}

.cross{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:88px;
  color:#e53935;
  opacity:0;
  z-index:4;
  animation:crossfade 700ms ease-out;
}

@keyframes crossfade{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
  40%{opacity:.85}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.2)}
}

@media(max-width:520px){
  .screen{padding:10px}
  .card{width:94vw;padding:16px;border-radius:22px}
  h1{font-size:28px}
  h2{font-size:20px}
  p{font-size:16px}
  .topbar{grid-template-columns:1fr;gap:6px}
  .badge{font-size:15px;padding:9px 8px}
  .question{font-size:20px;margin:18px 0}
  .question-image-container img{max-width:260px;max-height:170px}
  .option{font-size:18px;padding:16px;min-height:64px}
  button{width:100%;font-size:18px;padding:15px 18px}
  .feedback{font-size:17px}
  .explain{font-size:15px}
}

@media(max-height:520px){
  .active{align-items:flex-start}
  .screen{padding-top:10px}
  .card{margin:8px 0}
  .question{margin:14px 0}
  .option{min-height:54px;padding:13px}
}

@media(prefers-reduced-motion:reduce){
  .bg span,.star,.cross{animation:none}
}
</style>
</head>

<body>

<div class="bg">
  <span>⭐</span>
  <span>🐘</span>
  <span>⭐</span>
  <span>🐾</span>
  <span>⭐</span>
</div>

<div id="splash" class="screen active">
  <div class="card">
    <img src="assets/innovine-logo.png" class="logo" alt="Innovine Logo" loading="eager" decoding="async">
    <h2>Loading your game...</h2>
  </div>
</div>

<div id="intro" class="screen">
  <div class="card">
    <h1>Animal Kingdom</h1>
    <h2>Grade 2 EVS</h2>
    <p>Choose the best answer. You get one retry after a wrong answer.</p>
    <p>Each question has a 60-second timer.</p>
    <button onclick="startGame()">Start Game</button>
  </div>
</div>

<div id="quiz" class="screen">
  <div class="card">
    <div class="topbar">
      <div class="badge" id="qCount">Question 1/20</div>
      <div class="badge">Score: <span id="score">0</span></div>
      <div class="badge timer">Time: <span id="time">60</span>s</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="questionImageContainer" class="question-image-container"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button id="nextBtn" class="hidden" onclick="nextQuestion()">Next</button>
  </div>
</div>

<div id="result" class="screen">
  <div class="card">
    <h1>Great Work!</h1>
    <h2>Your Score: <span id="finalScore"></span>/20</h2>
    <p id="resultMsg"></p>
    <button onclick="location.reload()">Play Again</button>
  </div>
</div>

<div class="confetti" id="confetti"></div>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/clapping.mp3" preload="auto"></audio>

<script>
const questions=[
{q:"Look at the picture. Which clue shows that this elephant is a wild animal?",image:"assets/ch8_q1.png",o:["It is living in a forest habitat","It has large ears","It has a long trunk","It is grey in colour"],a:0,e:"Wild animals live in natural habitats such as forests."},

{q:"Why do people keep domestic animals like cows, goats, and hens?",o:["They help people and provide useful products","They live only in forests","They scare wild animals away","They do not help humans"],a:0,e:"Domestic animals help people and provide useful things such as milk, eggs, and wool."},

{q:"A family wants to make a warm woollen sweater. Which animal provides the material?",o:["Sheep","Hen","Fish","Duck"],a:0,e:"Sheep provide wool which is used to make warm clothes."},

{q:"Which group contains only animals commonly reared on farms?",o:["Cow, duck, goat","Tiger, lion, fox","Whale, shark, fish","Eagle, sparrow, owl"],a:0,e:"Cow, duck, and goat are farm animals."},

{q:"Look at the picture. Why is this rabbit called a pet animal?",image:"assets/ch8_q5.png",o:["It is being cared for at home by a child","It lives in a forest","It hunts other animals","It lives in water"],a:0,e:"Animals kept and cared for at home are called pet animals."},

{q:"A giraffe mainly eats leaves from tall trees. What kind of eater is it?",o:["Herbivore","Carnivore","Omnivore","Pet animal"],a:0,e:"Animals that eat plants are called herbivores."},

{q:"A wolf hunts and eats other animals. What does this tell us about its food habit?",o:["It is a carnivore","It is a herbivore","It is an omnivore","It is a pet"],a:0,e:"Animals that eat flesh are called carnivores."},

{q:"Which animal is different from the others based on its food habit?",o:["Leopard","Horse","Donkey","Zebra"],a:0,e:"Leopard is a carnivore, while horse, donkey, and zebra mainly eat plants."},

{q:"A crow eats grains, fruits, and insects. What type of eater is it?",o:["Omnivore","Herbivore","Carnivore","Water animal"],a:0,e:"Animals that eat both plants and animals are omnivores."},

{q:"A farmer wants to build a proper shelter for hens. Which shelter should he choose?",o:["Coop","Stable","Kennel","Den"],a:0,e:"A hen lives in a coop."},

{q:"Why would a fish not survive if it is kept out of water for a long time?",o:["Fish need water to live","Fish cannot see on land","Fish eat only water plants","Fish dislike sunlight"],a:0,e:"Fish need water for survival."},

{q:"Look at the picture. Why is the wooden structure suitable for the dog?",image:"assets/ch8_q12.png",o:["It provides the dog with a safe shelter","It helps the dog fly","It stores food for wild animals","It is a place for hens"],a:0,e:"The picture shows a kennel, which is a dog's shelter."},

{q:"A duck moves easily through ponds and lakes. Which body feature helps it swim?",o:["Webbed feet","Horns","Tail","Beak"],a:0,e:"Webbed feet help ducks paddle through water."},

{q:"An eagle can fly high above forests and mountains. Which body part helps it do this?",o:["Wings","Fins","Hooves","Horns"],a:0,e:"Birds use their wings to fly."},

{q:"Your pet parrot's water bowl is empty on a hot day. What should you do?",o:["Give it clean water","Ignore it","Remove its food","Cover the cage"],a:0,e:"Pets need clean water every day."},

{q:"Some animals are becoming fewer in number and need protection. Which animal below is endangered?",o:["Panda","Cow","Goat","Cat"],a:0,e:"Pandas are endangered animals and need protection."},

{q:"Many trees are cut down in a forest. How might this affect monkeys living there?",o:["They may lose their homes","They will get larger homes","They will become farm animals","They will stop climbing trees"],a:0,e:"Deforestation destroys the habitats of many wild animals."},

{q:"Which action shows that a person is not caring for animals properly?",o:["Hurting animals for fun","Giving them food","Keeping shelters clean","Taking sick animals to a doctor"],a:0,e:"Animals should be treated kindly and cared for."},

{q:"Your goat has stopped eating and looks weak. What is the best thing to do?",o:["Call an animal doctor","Make it run faster","Leave it alone","Change its shelter"],a:0,e:"A sick animal should be treated by a veterinarian."},

{q:"What quality do we show when we feed pets, keep them safe, and care for them when they are sick?",o:["Kindness and responsibility","Laziness","Fear","Anger"],a:0,e:"Taking care of animals shows kindness and responsibility."}
];

let current=0;
let score=0;
let attempts=0;
let timer;
let timeLeft=60;
let locked=false;

const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");

setTimeout(function(){
  showScreen("intro");
},5000);

function showScreen(id){
  const screens=document.querySelectorAll(".screen");
  for(let i=0;i<screens.length;i++){
    screens[i].classList.remove("active");
  }
  document.getElementById(id).classList.add("active");
}

function startGame(){
  score=0;
  current=0;
  showScreen("quiz");
  loadQuestion();
}

function loadQuestion(){
  locked=false;
  attempts=0;
  clearInterval(timer);
  timeLeft=60;

  const q=questions[current];

  document.getElementById("time").textContent=timeLeft;
  document.getElementById("score").textContent=score;
  document.getElementById("qCount").textContent="Question "+(current+1)+"/"+questions.length;
  document.getElementById("question").textContent=q.q;
  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").classList.add("hidden");

  const imageContainer=document.getElementById("questionImageContainer");
  imageContainer.innerHTML="";

  if(q.image){
    const img=document.createElement("img");
    img.src=q.image;
    img.alt="Question image";
    img.loading="eager";
    img.decoding="async";
    imageContainer.appendChild(img);
  }

  const progress=((current)/questions.length)*100;
  document.getElementById("progressBar").style.width=progress+"%";

  const box=document.getElementById("options");
  box.innerHTML="";

  for(let i=0;i<q.o.length;i++){
    const div=document.createElement("div");
    div.className="option";
    div.textContent=q.o[i];
    div.onclick=function(){
      checkAnswer(i,div);
    };
    box.appendChild(div);
  }

  startTimer();
}

function startTimer(){
  timer=setInterval(function(){
    timeLeft--;
    document.getElementById("time").textContent=timeLeft;

    if(timeLeft<=0){
      clearInterval(timer);
      showAnswer("Time is up!");
    }
  },1000);
}

function checkAnswer(i,el){
  if(locked){return}

  const q=questions[current];

  if(i===q.a){
    locked=true;
    clearInterval(timer);
    score++;
    document.getElementById("score").textContent=score;
    el.classList.add("correct");
    document.getElementById("feedback").innerHTML="Correct!<div class='explain'>"+q.e+"</div>";

    playSound(correctSound);
    setTimeout(function(){playSound(clapSound)},250);

    makeConfetti();
    document.getElementById("nextBtn").classList.remove("hidden");
  }else{
    attempts++;
    el.classList.add("wrong");
    showCross();
    playSound(wrongSound);

    if(attempts===1){
      document.getElementById("feedback").innerHTML="Try once more.";
      el.onclick=null;
    }else{
      showAnswer("Not quite.");
    }
  }
}

function showAnswer(msg){
  locked=true;
  clearInterval(timer);

  const q=questions[current];
  const options=document.querySelectorAll(".option");

  for(let i=0;i<options.length;i++){
    options[i].onclick=null;
    if(i===q.a){options[i].classList.add("correct")}
  }

  document.getElementById("feedback").innerHTML=
    msg+"<div class='explain'>Correct answer: <b>"+q.o[q.a]+"</b><br>"+q.e+"</div>";

  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion(){
  current++;
  if(current<questions.length){
    loadQuestion();
  }else{
    document.getElementById("progressBar").style.width="100%";
    showResult();
  }
}

function showResult(){
  showScreen("result");
  document.getElementById("finalScore").textContent=score;

  let msg="Good effort! Keep practising animal types, shelters, movement, and care.";

  if(score>=18){
    msg="Excellent! You understand the animal kingdom and animal care very well.";
  }else if(score>=14){
    msg="Well done! A little more practice will make it even better.";
  }

  document.getElementById("resultMsg").textContent=msg;
}

function makeConfetti(){
  const box=document.getElementById("confetti");

  for(let i=0;i<18;i++){
    const s=document.createElement("div");
    s.className="star";
    s.textContent="⭐";
    s.style.left=Math.random()*100+"vw";
    s.style.top=(55+Math.random()*25)+"vh";
    box.appendChild(s);

    setTimeout(function(){s.remove()},900);
  }
}

function showCross(){
  const x=document.createElement("div");
  x.className="cross";
  x.textContent="✕";
  document.body.appendChild(x);

  setTimeout(function(){x.remove()},700);
}

function playSound(sound){
  if(!sound){return}

  try{
    sound.currentTime=0;
    const playPromise=sound.play();

    if(playPromise!==undefined){
      playPromise.catch(function(){});
    }
  }catch(error){}
}
</script>

</body>
</html>
