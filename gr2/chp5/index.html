<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Water for All</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;min-height:100%;overflow-x:hidden}
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#e3f2fd,#e0f7fa,#fff8e1);
  color:#263238;
}

.bg span{
  position:fixed;
  top:-30px;
  font-size:22px;
  opacity:.22;
  animation:float 14s linear infinite;
  z-index:0;
}
.bg span:nth-child(1){left:8%;animation-delay:0s}
.bg span:nth-child(2){left:28%;animation-delay:3s}
.bg span:nth-child(3){left:52%;animation-delay:6s}
.bg span:nth-child(4){left:76%;animation-delay:2s}
.bg span:nth-child(5){left:92%;animation-delay:5s}

@keyframes float{
  from{transform:translateY(-40px) rotate(0deg)}
  to{transform:translateY(110vh) rotate(180deg)}
}

.screen{
  display:none;
  min-height:100vh;
  padding:16px;
  position:relative;
  z-index:1;
}

.active{
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:92vw;
  max-width:760px;
  background:rgba(255,255,255,.96);
  border-radius:26px;
  padding:22px;
  box-shadow:0 10px 26px rgba(0,0,0,.13);
  text-align:center;
}

.logo{
  width:180px;
  max-width:70%;
  height:auto;
  margin-bottom:18px;
}

h1{
  color:#0277bd;
  margin:10px 0;
  font-size:36px;
  line-height:1.15;
}

h2{
  color:#00695c;
  margin:8px 0;
  font-size:24px;
}

p{
  font-size:18px;
  line-height:1.45;
}

button{
  border:0;
  border-radius:18px;
  padding:15px 24px;
  margin:8px;
  font-size:18px;
  font-weight:bold;
  background:#ffca28;
  color:#263238;
  cursor:pointer;
  box-shadow:0 5px 0 #f9a825;
  min-height:54px;
}

button:active{
  transform:translateY(3px);
  box-shadow:0 2px 0 #f9a825;
}

.topbar{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:14px;
  font-weight:bold;
}

.badge{
  background:#e3f2fd;
  border-radius:16px;
  padding:10px 8px;
  text-align:center;
  font-size:16px;
}

.timer{
  background:#fff3e0;
}

.progress-wrap{
  width:100%;
  height:12px;
  background:#e0e0e0;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:16px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#4fc3f7;
  transition:.3s;
}

.question-image-container{
  text-align:center;
  margin:10px auto 14px;
  min-height:0;
}

.question-image-container img{
  display:block;
  width:100%;
  max-width:280px;
  max-height:180px;
  object-fit:contain;
  margin:0 auto;
  border-radius:18px;
}

.question{
  font-size:24px;
  line-height:1.4;
  font-weight:bold;
  margin:22px 0;
}

.options{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.option{
  background:#f1f8e9;
  border:2px solid #c5e1a5;
  border-radius:18px;
  padding:18px;
  font-size:20px;
  min-height:70px;
  display:flex;
  align-items:center;
  cursor:pointer;
  text-align:left;
  line-height:1.3;
}

.option:hover{
  background:#e8f5e9;
}

.correct{
  background:#c8f7c5!important;
  border-color:#2e7d32!important;
  transform:scale(1.01);
}

.wrong{
  background:#ffcdd2!important;
  border-color:#c62828!important;
}

.feedback{
  min-height:62px;
  margin-top:16px;
  font-size:18px;
  font-weight:bold;
}

.explain{
  font-size:16px;
  font-weight:normal;
  margin-top:6px;
  line-height:1.4;
}

.hidden{display:none}

.confetti{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:3;
}

.star{
  position:absolute;
  font-size:24px;
  animation:pop 900ms ease-out forwards;
}

@keyframes pop{
  0%{transform:scale(.3) translateY(0);opacity:1}
  100%{transform:scale(1.4) translateY(-120px);opacity:0}
}

.cross{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:88px;
  color:#e53935;
  opacity:0;
  z-index:4;
  animation:crossfade 700ms ease-out;
}

@keyframes crossfade{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
  40%{opacity:.85}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.2)}
}

@media(max-width:520px){
  .screen{padding:10px}
  .card{width:94vw;padding:16px;border-radius:22px}
  h1{font-size:28px}
  h2{font-size:20px}
  p{font-size:16px}
  .topbar{grid-template-columns:1fr;gap:6px}
  .badge{font-size:15px;padding:9px 8px}
  .question{font-size:20px;margin:18px 0}
  .question-image-container img{max-width:260px;max-height:170px}
  .option{font-size:18px;padding:16px;min-height:64px}
  button{width:100%;font-size:18px;padding:15px 18px}
  .feedback{font-size:17px}
  .explain{font-size:15px}
}

@media(max-height:520px){
  .active{align-items:flex-start}
  .screen{padding-top:10px}
  .card{margin:8px 0}
  .question{margin:14px 0}
  .option{min-height:54px;padding:13px}
}

@media(prefers-reduced-motion:reduce){
  .bg span,.star,.cross{animation:none}
}
</style>
</head>

<body>

<div class="bg">
  <span>💧</span>
  <span>⭐</span>
  <span>🚰</span>
  <span>⭐</span>
  <span>💧</span>
</div>

<div id="splash" class="screen active">
  <div class="card">
    <img src="assets/innovine-logo.png" class="logo" alt="Innovine Logo" loading="eager" decoding="async">
    <h2>Loading your game...</h2>
  </div>
</div>

<div id="intro" class="screen">
  <div class="card">
    <h1>Water for All</h1>
    <h2>Grade 2 EVS</h2>
    <p>Choose the best answer. You get one retry after a wrong answer.</p>
    <p>Each question has a 60-second timer.</p>
    <button onclick="startGame()">Start Game</button>
  </div>
</div>

<div id="quiz" class="screen">
  <div class="card">
    <div class="topbar">
      <div class="badge" id="qCount">Question 1/20</div>
      <div class="badge">Score: <span id="score">0</span></div>
      <div class="badge timer">Time: <span id="time">60</span>s</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="questionImageContainer" class="question-image-container"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button id="nextBtn" class="hidden" onclick="nextQuestion()">Next</button>
  </div>
</div>

<div id="result" class="screen">
  <div class="card">
    <h1>Great Work!</h1>
    <h2>Your Score: <span id="finalScore"></span>/20</h2>
    <p id="resultMsg"></p>
    <button onclick="location.reload()">Play Again</button>
  </div>
</div>

<div class="confetti" id="confetti"></div>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/clapping.mp3" preload="auto"></audio>

<script>
const questions=[
{q:"A family uses water every day for drinking, cooking, and cleaning. Why is water important?",o:["It is needed for daily life","It is used only for games","It is used only in schools","It is used only in factories"],a:0,e:"Water is needed for many daily activities."},
{q:"Which activity needs clean drinking water?",o:["Watering plants","Drinking water","Washing a bicycle","Cleaning shoes"],a:1,e:"Clean water is important for drinking."},
{q:"Which group contains only uses of water?",o:["Drinking, cooking, bathing","Reading, writing, drawing","Running, jumping, singing","Sleeping, resting, dreaming"],a:0,e:"Water is used for drinking, cooking, and bathing."},
{q:"A tap stops giving water for an entire day. Which problem is most likely to happen?",o:["Difficulty cooking and cleaning","More rainfall","Faster internet","More playgrounds"],a:0,e:"Many daily activities depend on water."},
{q:"Look at the picture. This is a common source of water found in many homes.",image:"assets/ch5_q5.png",o:["Tap","Television","Chair","Window"],a:0,e:"A tap is a common source of water found in homes."},
{q:"Which of these is a natural source of water?",o:["River","Water tank","Tap","Bucket"],a:0,e:"A river is a natural source of water."},
{q:"During the rainy season, water is collected and stored for later use. This is called:",o:["Rainwater harvesting","Water wasting","Water pollution","Water drying"],a:0,e:"Collecting rainwater for later use is called rainwater harvesting."},
{q:"Why should we close a tap after using it?",o:["To save water","To increase waste","To make noise","To stop cooking"],a:0,e:"Closing the tap helps save water."},
{q:"Find the one that is different.",o:["River","Pond","Lake","Television"],a:3,e:"River, pond, and lake are water sources. Television is not."},
{q:"You are thirsty after playing outside. Which water is safest to drink?",o:["Clean drinking water","Dirty puddle water","Drain water","Muddy water"],a:0,e:"Clean drinking water is safest to drink."},
{q:"Garbage is thrown into a river. What may happen?",o:["Water becomes polluted","Water becomes cleaner","More fish appear immediately","The river disappears"],a:0,e:"Garbage can pollute river water."},
{q:"Why should drinking water be kept covered?",o:["To keep it clean and safe","To change its colour","To make it colder","To make it heavier"],a:0,e:"Keeping drinking water covered helps keep it clean and safe."},
{q:"Look at the picture of a tap left running. What should be done?",image:"assets/ch5_q13.png",o:["Close the tap","Leave it open","Break the tap","Walk away"],a:0,e:"A running tap wastes water and should be closed."},
{q:"While brushing your teeth, what is the best habit?",o:["Keep the tap running","Turn off the tap when not needed","Waste extra water","Fill the sink completely"],a:1,e:"Turning off the tap when not needed saves water."},
{q:"A child waters plants using leftover water from washing vegetables. What does this show?",o:["Saving water","Wasting water","Polluting water","Ignoring plants"],a:0,e:"Reusing leftover water is a way to save water."},
{q:"Children are collecting rainwater in a storage tank. What are they doing?",image:"assets/ch5_q16.png",o:["Rainwater harvesting","Water pollution","Water wastage","Flooding"],a:0,e:"Collecting and storing rainwater is rainwater harvesting."},
{q:"Find the wrong habit.",o:["Closing taps properly","Using water carefully","Leaving taps running unnecessarily","Using buckets for bathing"],a:2,e:"Leaving taps running unnecessarily wastes water."},
{q:"You see a leaking tap in school. What should you do?",o:["Ignore it","Inform a teacher or adult","Leave it running","Play with it"],a:1,e:"A teacher or adult should be told about a leaking tap."},
{q:"A village has less water during summer. What is a good practice?",o:["Share water carefully","Waste water","Keep all water for yourself","Spill water"],a:0,e:"When water is less, it should be shared and used carefully."},
{q:"Water is often called precious because:",o:["We need it for life","It is made of gold","It is used only in cities","It is found only in rivers"],a:0,e:"Water is precious because all living things need it."}
];

let current=0;
let score=0;
let attempts=0;
let timer;
let timeLeft=60;
let locked=false;

const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");

setTimeout(function(){showScreen("intro")},5000);

function showScreen(id){
  const screens=document.querySelectorAll(".screen");
  for(let i=0;i<screens.length;i++){
    screens[i].classList.remove("active");
  }
  document.getElementById(id).classList.add("active");
}

function startGame(){
  score=0;
  current=0;
  showScreen("quiz");
  loadQuestion();
}

function loadQuestion(){
  locked=false;
  attempts=0;
  clearInterval(timer);
  timeLeft=60;

  const q=questions[current];

  document.getElementById("time").textContent=timeLeft;
  document.getElementById("score").textContent=score;
  document.getElementById("qCount").textContent="Question "+(current+1)+"/"+questions.length;
  document.getElementById("question").textContent=q.q;
  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").classList.add("hidden");

  const imageContainer=document.getElementById("questionImageContainer");
  imageContainer.innerHTML="";

  if(q.image){
    const img=document.createElement("img");
    img.src=q.image;
    img.alt="Question image";
    img.loading="eager";
    img.decoding="async";
    imageContainer.appendChild(img);
  }

  const progress=(current/questions.length)*100;
  document.getElementById("progressBar").style.width=progress+"%";

  const box=document.getElementById("options");
  box.innerHTML="";

  for(let i=0;i<q.o.length;i++){
    const div=document.createElement("div");
    div.className="option";
    div.textContent=q.o[i];
    div.onclick=function(){checkAnswer(i,div)};
    box.appendChild(div);
  }

  startTimer();
}

function startTimer(){
  timer=setInterval(function(){
    timeLeft--;
    document.getElementById("time").textContent=timeLeft;
    if(timeLeft<=0){
      clearInterval(timer);
      showAnswer("Time is up!");
    }
  },1000);
}

function checkAnswer(i,el){
  if(locked){return}

  const q=questions[current];

  if(i===q.a){
    locked=true;
    clearInterval(timer);
    score++;
    document.getElementById("score").textContent=score;
    el.classList.add("correct");
    document.getElementById("feedback").innerHTML="Correct!<div class='explain'>"+q.e+"</div>";

    playSound(correctSound);
    setTimeout(function(){playSound(clapSound)},250);

    makeConfetti();
    document.getElementById("nextBtn").classList.remove("hidden");
  }else{
    attempts++;
    el.classList.add("wrong");
    showCross();
    playSound(wrongSound);

    if(attempts===1){
      document.getElementById("feedback").innerHTML="Try once more.";
      el.onclick=null;
    }else{
      showAnswer("Not quite.");
    }
  }
}

function showAnswer(msg){
  locked=true;
  clearInterval(timer);

  const q=questions[current];
  const options=document.querySelectorAll(".option");

  for(let i=0;i<options.length;i++){
    options[i].onclick=null;
    if(i===q.a){
      options[i].classList.add("correct");
    }
  }

  document.getElementById("feedback").innerHTML=
    msg+"<div class='explain'>Correct answer: <b>"+q.o[q.a]+"</b><br>"+q.e+"</div>";

  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion(){
  current++;

  if(current<questions.length){
    loadQuestion();
  }else{
    document.getElementById("progressBar").style.width="100%";
    showResult();
  }
}

function showResult(){
  showScreen("result");
  document.getElementById("finalScore").textContent=score;

  let msg="Good effort! Keep practising water use and water-saving habits.";

  if(score>=18){
    msg="Excellent! You understand water sources, uses, saving water, and clean water habits very well.";
  }else if(score>=14){
    msg="Well done! A little more practice will make it even better.";
  }

  document.getElementById("resultMsg").textContent=msg;
}

function makeConfetti(){
  const box=document.getElementById("confetti");
  for(let i=0;i<18;i++){
    const s=document.createElement("div");
    s.className="star";
    s.textContent="⭐";
    s.style.left=Math.random()*100+"vw";
    s.style.top=(55+Math.random()*25)+"vh";
    box.appendChild(s);
    setTimeout(function(){s.remove()},900);
  }
}

function showCross(){
  const x=document.createElement("div");
  x.className="cross";
  x.textContent="✕";
  document.body.appendChild(x);
  setTimeout(function(){x.remove()},700);
}

function playSound(sound){
  if(!sound){return}
  try{
    sound.currentTime=0;
    const playPromise=sound.play();
    if(playPromise!==undefined){
      playPromise.catch(function(){});
    }
  }catch(error){}
}
</script>

</body>
</html>
