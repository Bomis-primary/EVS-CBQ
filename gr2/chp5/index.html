<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 5: Keeping Safe</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#fff7d6,#e3f7ff,#f4eaff);
  color:#253238;
  overflow-x:hidden;
}
body{display:flex;align-items:center;justify-content:center;padding:12px}
.bg span{
  position:fixed;
  top:-30px;
  font-size:22px;
  opacity:.18;
  animation:float 16s linear infinite;
  z-index:0;
}
.bg span:nth-child(1){left:8%;animation-delay:0s}
.bg span:nth-child(2){left:28%;animation-delay:4s}
.bg span:nth-child(3){left:50%;animation-delay:8s}
.bg span:nth-child(4){left:72%;animation-delay:2s}
.bg span:nth-child(5){left:90%;animation-delay:6s}
@keyframes float{
  from{transform:translateY(-40px) rotate(0deg)}
  to{transform:translateY(110vh) rotate(180deg)}
}
.app{
  position:relative;
  z-index:2;
  width:100%;
  max-width:760px;
  min-height:540px;
  background:rgba(255,255,255,.95);
  border-radius:28px;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
  padding:18px;
  overflow:hidden;
}
.screen{display:none;text-align:center}
.screen.active{display:block}
.logo-wrap{
  height:500px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}
.logo-wrap img{max-width:260px;width:70%;height:auto}
h1{font-size:30px;margin:12px 0;color:#1864ab}
h2{font-size:24px;margin:10px 0;color:#2b7a78}
p{font-size:18px;line-height:1.5}
.btn{
  border:0;
  background:#ffb703;
  color:#222;
  padding:13px 22px;
  margin:10px 6px;
  border-radius:18px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 4px 0 #d89000;
}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 #d89000}
.topbar{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.badge{
  background:#e7f5ff;
  border:2px solid #74c0fc;
  border-radius:16px;
  padding:8px 12px;
  font-weight:bold;
  font-size:15px;
}
.timer{background:#fff3bf;border-color:#ffd43b}
.question-card{
  background:#ffffff;
  border:2px solid #d0ebff;
  border-radius:24px;
  padding:14px;
  text-align:left;
}
.question-image-container{
  text-align:center;
  margin:10px auto 14px;
}
.question-image-container img{
  display:block;
  width:100%;
  max-width:280px;
  max-height:180px;
  object-fit:contain;
  margin:0 auto;
  border-radius:18px;
}
.question{
  font-size:21px;
  font-weight:bold;
  line-height:1.35;
  margin:10px 0 14px;
  text-align:center;
}
.options{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.option{
  width:100%;
  text-align:left;
  padding:13px 14px;
  border:2px solid #dee2e6;
  background:#f8f9fa;
  border-radius:16px;
  font-size:17px;
  cursor:pointer;
}
.option.correct{background:#d3f9d8;border-color:#37b24d}
.option.wrong{background:#ffe3e3;border-color:#f03e3e}
.feedback{
  min-height:54px;
  margin-top:12px;
  font-size:17px;
  font-weight:bold;
  text-align:center;
}
.next-btn{display:none}
.cross{
  font-size:42px;
  color:#e03131;
  animation:pop .25s ease;
}
@keyframes pop{
  from{transform:scale(.5);opacity:.4}
  to{transform:scale(1);opacity:1}
}
.confetti{
  position:fixed;
  font-size:20px;
  pointer-events:none;
  animation:fall 900ms ease-out forwards;
  z-index:20;
}
@keyframes fall{
  from{transform:translateY(0) rotate(0deg);opacity:1}
  to{transform:translateY(120px) rotate(180deg);opacity:0}
}
.result-box{
  background:#f8f9fa;
  border:2px solid #d0ebff;
  border-radius:24px;
  padding:22px;
  margin-top:16px;
}
@media(max-width:520px){
  body{padding:8px}
  .app{border-radius:20px;padding:12px;min-height:520px}
  h1{font-size:25px}
  h2{font-size:21px}
  p{font-size:16px}
  .question{font-size:18px}
  .option{font-size:16px;padding:12px}
  .badge{font-size:13px;padding:7px 9px}
  .btn{font-size:16px;padding:12px 18px}
}
</style>
</head>
<body>

<div class="bg">
  <span>⭐</span><span>🎈</span><span>⭐</span><span>🎉</span><span>⭐</span>
</div>

<div class="app">

  <section id="splash" class="screen active">
    <div class="logo-wrap">
      <img src="assets/innovine-logo.png" alt="Innovine Logo">
    </div>
  </section>

  <section id="intro" class="screen">
    <h1>Keeping Safe</h1>
    <h2>Grade 2 EVS</h2>
    <p>Read each question carefully. Choose the safest answer.</p>
    <p>You get one more try if your first answer is wrong.</p>
    <button class="btn" onclick="startGame()">Start Game</button>
  </section>

  <section id="quiz" class="screen">
    <div class="topbar">
      <div class="badge" id="progress">Question 1/20</div>
      <div class="badge" id="score">Score: 0</div>
      <div class="badge timer" id="timer">Time: 60s</div>
    </div>

    <div class="question-card">
      <div class="question-image-container" id="imageBox">
        <img id="qImage" src="" alt="">
      </div>
      <div class="question" id="questionText"></div>
      <div class="options" id="optionsBox"></div>
      <div class="feedback" id="feedback"></div>
      <div style="text-align:center">
        <button class="btn next-btn" id="nextBtn" onclick="nextQuestion()">Next</button>
      </div>
    </div>
  </section>

  <section id="result" class="screen">
    <h1>Game Complete!</h1>
    <div class="result-box">
      <h2 id="resultTitle"></h2>
      <p id="finalScore"></p>
      <p id="resultMessage"></p>
      <button class="btn" onclick="restartGame()">Play Again</button>
    </div>
  </section>

</div>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/clapping.mp3" preload="auto"></audio>

<script>
const questions=[
{q:"Look at the picture. Why are the children crossing on the black and white stripes with an adult?",image:"assets/ch5_q1.png",o:["It is a safer place because vehicles can see people crossing","It is a place for playing games","It is used for parking vehicles","It is the fastest place to run"],a:0,e:"A zebra crossing helps people cross safely because drivers can see them clearly."},

{q:"Aarav reaches a traffic signal and the light is red. What should he do?",o:["Stop and wait safely","Run across quickly","Stand in the middle of the road","Play near the signal"],a:0,e:"A red traffic light tells us to stop and wait."},

{q:"Sana sees a green traffic light but the road is still busy. What should she do before crossing?",o:["Look carefully and cross only when it is safe","Run without looking","Close her eyes and walk","Cross alone quickly"],a:0,e:"Even when the light is green, we must check the road and cross safely."},

{q:"Which pair shows safe road habits?",o:["Use the zebra crossing and walk on the footpath","Run on the road and jump the divider","Play cricket on the road","Cross without looking both ways"],a:0,e:"Using the zebra crossing and footpath helps keep us safe."},

{q:"Mehul is walking beside a busy road. Where should he walk?",o:["On the footpath","In the middle of the road","Behind parked cars","On the road divider"],a:0,e:"People should walk on the footpath to stay away from moving vehicles."},

{q:"Ira sits in a car with her family. What should she use before the car starts?",o:["Seatbelt","Pillow","Toy car","Lunch box"],a:0,e:"A seatbelt helps keep us safe inside a moving car."},

{q:"Children are waiting for the school bus. Which child is following the safest habit?",o:["The child standing in a queue","The child pushing others","The child running behind the bus","The child hanging near the door"],a:0,e:"Waiting in a queue keeps everyone safe while boarding the bus."},

{q:"Why should people wear seatbelts in a car?",o:["To stay safer if the car stops suddenly","To decorate the seat","To open the window","To sleep better"],a:0,e:"A seatbelt protects us if the car stops or jerks suddenly."},

{q:"Which item does not belong with road safety items?",o:["Pillow","Helmet","Seatbelt","Traffic signal"],a:0,e:"Helmet, seatbelt and traffic signal help with safety. A pillow is not a road safety item."},

{q:"Lata is riding on a scooter with her father. What should she wear to protect her head?",o:["Helmet","Cap","Balloon","Ribbon"],a:0,e:"A helmet protects the head while riding a two-wheeler."},

{q:"A child wants to play with matchsticks at home. What could happen?",o:["The child may get burnt","The child will become stronger","The house will become cleaner","The child will get more toys"],a:0,e:"Matchsticks can cause fire and burn injuries."},

{q:"Look at the picture. What should the child do instead of touching the electric socket?",image:"assets/ch5_q12.png",o:["Move away and tell an adult","Put another finger inside","Touch it with wet hands","Pour water near it"],a:0,e:"Electric sockets are dangerous. Children should move away and call an adult."},

{q:"Kunal finds sharp scissors on a table. What should he do?",o:["Ask an adult before using them","Run while holding them","Play sword fight with them","Hide them under a pillow"],a:0,e:"Sharp objects can hurt us, so children should use them only with adult help."},

{q:"Naina has wet hands after washing them. What should she do before touching a switch?",o:["Dry her hands first","Touch the switch quickly","Ask a friend to touch it","Touch it with both hands"],a:0,e:"Wet hands can make electric switches unsafe to touch."},

{q:"A child is jumping on desks in the classroom. Why is this unsafe?",o:["The child may fall and get hurt","The desk will become taller","The classroom will become brighter","The child will learn faster"],a:0,e:"Jumping on furniture can cause falls and injuries."},

{q:"Children are walking down the school stairs after class. Which action is safest?",o:["Walk slowly and hold the railing","Push friends from behind","Slide on the railing","Run down the steps"],a:0,e:"Walking carefully on stairs helps prevent falls."},

{q:"Tara wants to swim in a pool. Which choice is safest?",o:["Swim with an adult or trainer nearby","Swim alone in deep water","Run near the pool edge","Jump in without checking"],a:0,e:"Children should swim only when an adult or trainer is watching."},

{q:"Which playground habit can cause an accident?",o:["Standing in front of a moving swing","Waiting for your turn","Playing peacefully","Not pushing others"],a:0,e:"Standing near a moving swing is unsafe because it can hit you."},

{q:"A stranger offers chocolates and asks Vivaan to come along. What should Vivaan do?",o:["Say no and tell a trusted adult","Go with the stranger","Take chocolates quietly","Follow the stranger"],a:0,e:"Children should never go with strangers and should tell a trusted adult."},

{q:"Why do safety rules matter at home, school, road and playground?",o:["They help us avoid accidents and stay safe","They help us miss school","They make us run faster","They help us lose toys"],a:0,e:"Safety rules protect us from danger and accidents."}
];

let current=0;
let score=0;
let attempts=0;
let timeLeft=60;
let timerId=null;
let locked=false;

const splash=document.getElementById("splash");
const intro=document.getElementById("intro");
const quiz=document.getElementById("quiz");
const result=document.getElementById("result");
const progress=document.getElementById("progress");
const scoreBox=document.getElementById("score");
const timerBox=document.getElementById("timer");
const questionText=document.getElementById("questionText");
const optionsBox=document.getElementById("optionsBox");
const feedback=document.getElementById("feedback");
const nextBtn=document.getElementById("nextBtn");
const imageBox=document.getElementById("imageBox");
const qImage=document.getElementById("qImage");

const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");

setTimeout(()=>{
  splash.classList.remove("active");
  intro.classList.add("active");
},5000);

function showScreen(screen){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  screen.classList.add("active");
}

function startGame(){
  current=0;
  score=0;
  showScreen(quiz);
  loadQuestion();
}

function loadQuestion(){
  clearInterval(timerId);
  attempts=0;
  locked=false;
  timeLeft=60;
  feedback.innerHTML="";
  nextBtn.style.display="none";
  optionsBox.innerHTML="";

  const item=questions[current];
  progress.textContent="Question "+(current+1)+"/"+questions.length;
  scoreBox.textContent="Score: "+score;
  timerBox.textContent="Time: "+timeLeft+"s";
  questionText.textContent=item.q;

  if(item.image){
    qImage.src=item.image;
    imageBox.style.display="block";
  }else{
    qImage.src="";
    imageBox.style.display="none";
  }

  item.o.forEach((opt,index)=>{
    const btn=document.createElement("button");
    btn.className="option";
    btn.textContent=opt;
    btn.onclick=()=>selectAnswer(btn,index);
    optionsBox.appendChild(btn);
  });

  timerId=setInterval(()=>{
    timeLeft--;
    timerBox.textContent="Time: "+timeLeft+"s";
    if(timeLeft<=0){
      clearInterval(timerId);
      showAnswer("Time is up!");
    }
  },1000);
}

function selectAnswer(btn,index){
  if(locked)return;
  const item=questions[current];

  if(index===item.a){
    locked=true;
    clearInterval(timerId);
    btn.classList.add("correct");
    score++;
    scoreBox.textContent="Score: "+score;
    feedback.textContent="Correct! "+item.e;
    playCorrect();
    starConfetti();
    nextBtn.style.display="inline-block";
    disableOptions();
  }else{
    attempts++;
    btn.classList.add("wrong");
    playWrong();
    feedback.innerHTML='<div class="cross">✖</div>';

    if(attempts===1){
      setTimeout(()=>{
        feedback.textContent="Try once more. Think about the safest choice.";
        btn.disabled=true;
      },450);
    }else{
      showAnswer("Not quite.");
    }
  }
}

function showAnswer(prefix){
  locked=true;
  clearInterval(timerId);
  const item=questions[current];
  const buttons=document.querySelectorAll(".option");
  buttons.forEach((btn,i)=>{
    btn.disabled=true;
    if(i===item.a)btn.classList.add("correct");
  });
  feedback.textContent=prefix+" Correct answer: "+item.o[item.a]+". "+item.e;
  nextBtn.style.display="inline-block";
}

function disableOptions(){
  document.querySelectorAll(".option").forEach(btn=>btn.disabled=true);
}

function nextQuestion(){
  current++;
  if(current<questions.length){
    loadQuestion();
  }else{
    showResult();
  }
}

function showResult(){
  clearInterval(timerId);
  showScreen(result);
  document.getElementById("finalScore").textContent="Score: "+score+"/"+questions.length;

  let title,msg;
  if(score>=17){
    title="Excellent";
    msg="You made very safe choices!";
  }else if(score>=12){
    title="Well Done";
    msg="Good work. Keep practising safety rules.";
  }else{
    title="Good Effort";
    msg="Revise the safety rules and try again.";
  }

  document.getElementById("resultTitle").textContent=title;
  document.getElementById("resultMessage").textContent=msg;
}

function restartGame(){
  startGame();
}

function playCorrect(){
  try{
    correctSound.currentTime=0;
    correctSound.play();
    setTimeout(()=>{
      clapSound.currentTime=0;
      clapSound.play();
    },450);
  }catch(e){}
}

function playWrong(){
  try{
    wrongSound.currentTime=0;
    wrongSound.play();
  }catch(e){}
}

function starConfetti(){
  for(let i=0;i<18;i++){
    const star=document.createElement("div");
    star.className="confetti";
    star.textContent="⭐";
    star.style.left=Math.random()*100+"vw";
    star.style.top=(Math.random()*25+10)+"vh";
    document.body.appendChild(star);
    setTimeout(()=>star.remove(),950);
  }
}
</script>
</body>
</html>
