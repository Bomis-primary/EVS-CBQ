<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Air is Everywhere</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;min-height:100%;overflow-x:hidden}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#e3f2fd,#fff8e1,#e8f5e9);color:#263238}
.bg span{position:fixed;top:-30px;font-size:22px;opacity:.22;animation:float 14s linear infinite;z-index:0}
.bg span:nth-child(1){left:8%;animation-delay:0s}.bg span:nth-child(2){left:28%;animation-delay:3s}.bg span:nth-child(3){left:52%;animation-delay:6s}.bg span:nth-child(4){left:76%;animation-delay:2s}.bg span:nth-child(5){left:92%;animation-delay:5s}
@keyframes float{from{transform:translateY(-40px) rotate(0deg)}to{transform:translateY(110vh) rotate(180deg)}}
.screen{display:none;min-height:100vh;padding:16px;position:relative;z-index:1}
.active{display:flex;align-items:center;justify-content:center}
.card{width:92vw;max-width:760px;background:rgba(255,255,255,.96);border-radius:26px;padding:22px;box-shadow:0 10px 26px rgba(0,0,0,.13);text-align:center}
.logo{width:180px;max-width:70%;height:auto;margin-bottom:18px}
h1{color:#0277bd;margin:10px 0;font-size:36px;line-height:1.15}
h2{color:#2e7d32;margin:8px 0;font-size:24px}
p{font-size:18px;line-height:1.45}
button{border:0;border-radius:18px;padding:15px 24px;margin:8px;font-size:18px;font-weight:bold;background:#ffca28;color:#263238;cursor:pointer;box-shadow:0 5px 0 #f9a825;min-height:54px}
button:active{transform:translateY(3px);box-shadow:0 2px 0 #f9a825}
.topbar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;font-weight:bold}
.badge{background:#e3f2fd;border-radius:16px;padding:10px 8px;text-align:center;font-size:16px}
.timer{background:#fff3e0}
.progress-wrap{width:100%;height:12px;background:#e0e0e0;border-radius:20px;overflow:hidden;margin-bottom:16px}
.progress-bar{height:100%;width:0%;background:#66bb6a;transition:.3s}
.question-image-container{text-align:center;margin:10px auto 14px}.question-image-container img{display:block;width:100%;max-width:280px;max-height:180px;object-fit:contain;margin:0 auto;border-radius:18px}
.question{font-size:24px;line-height:1.4;font-weight:bold;margin:22px 0}
.options{display:grid;grid-template-columns:1fr;gap:12px}
.option{background:#f1f8e9;border:2px solid #c5e1a5;border-radius:18px;padding:18px;font-size:20px;min-height:70px;display:flex;align-items:center;cursor:pointer;text-align:left;line-height:1.3}
.option:hover{background:#e8f5e9}
.correct{background:#c8f7c5!important;border-color:#2e7d32!important;transform:scale(1.01)}
.wrong{background:#ffcdd2!important;border-color:#c62828!important}
.feedback{min-height:62px;margin-top:16px;font-size:18px;font-weight:bold}
.explain{font-size:16px;font-weight:normal;margin-top:6px;line-height:1.4}
.hidden{display:none}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:3}
.star{position:absolute;font-size:24px;animation:pop 900ms ease-out forwards}
@keyframes pop{0%{transform:scale(.3) translateY(0);opacity:1}100%{transform:scale(1.4) translateY(-120px);opacity:0}}
.cross{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:88px;color:#e53935;opacity:0;z-index:4;animation:crossfade 700ms ease-out}
@keyframes crossfade{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}40%{opacity:.85}100%{opacity:0;transform:translate(-50%,-50%) scale(1.2)}}
.finalbox{background:#fff8e1;border:2px dashed #ffb300;border-radius:20px;padding:16px;margin-top:16px}
.small{font-size:15px;color:#546e7a}
@media(max-width:520px){
.screen{padding:10px}.card{width:94vw;padding:16px;border-radius:22px}
h1{font-size:28px}h2{font-size:20px}p{font-size:16px}
.topbar{grid-template-columns:1fr;gap:6px}.badge{font-size:15px;padding:9px 8px}
.question{font-size:20px;margin:18px 0}.option{font-size:18px;padding:16px;min-height:64px}
button{width:100%;font-size:18px;padding:15px 18px}.feedback{font-size:17px}.explain{font-size:15px}
}
@media(max-height:520px){.active{align-items:flex-start}.screen{padding-top:10px}.card{margin:8px 0}.question{margin:14px 0}.option{min-height:54px;padding:13px}}
@media(prefers-reduced-motion:reduce){.bg span,.star,.cross{animation:none}}
</style>
</head>

<body>

<div class="bg">
<span>⭐</span><span>🌬️</span><span>⭐</span><span>🪁</span><span>⭐</span>
</div>

<div id="splash" class="screen active">
<div class="card">
<img src="assets/innovine-logo.png" class="logo" alt="Innovine Logo">
<h2>Loading your game...</h2>
</div>
</div>

<div id="intro" class="screen">
<div class="card">
<h1>Air is Everywhere</h1>
<h2>Grade 2 EVS</h2>
<p>Choose the best answer. You get one retry after a wrong answer.</p>
<p>Each question has a 60-second timer.</p>
<button onclick="startGame()">Start Game</button>
</div>
</div>

<div id="quiz" class="screen">
<div class="card">
<div class="topbar">
<div class="badge" id="qCount">Question 1/20</div>
<div class="badge">Score: <span id="score">0</span></div>
<div class="badge timer">Time: <span id="time">60</span>s</div>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
<div id="questionImageContainer" class="question-image-container"></div>
<div class="question" id="question"></div>
<div class="options" id="options"></div>
<div class="feedback" id="feedback"></div>
<button id="nextBtn" class="hidden" onclick="nextQuestion()">Next</button>
</div>
</div>



<div id="result" class="screen">
<div class="card">
<h1>Great Work!</h1>
<h2>Your Score: <span id="finalScore"></span>/20</h2>
<p id="resultMsg"></p>
<button onclick="location.reload()">Play Again</button>
</div>
</div>

<div class="confetti" id="confetti"></div>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/clapping.mp3" preload="auto"></audio>

<script>
const questions=[
{q:"Look at the picture. What is helping the kite stay up in the sky?",image:"assets/ch9_q1.png",o:["Moving air","Soil","Sunlight","Rope alone"],a:0,e:"The kite is flying because moving air pushes against it."},

{q:"Why do people, animals, and plants all need air?",o:["Air helps living things stay alive","Air helps make toys","Air changes colours","Air makes things heavier"],a:0,e:"Living things need air to survive."},

{q:"A child switches on a fan in a warm room. Why does the room feel more comfortable?",o:["The fan moves air around the room","The fan creates water","The fan removes sunlight","The fan makes the room smaller"],a:0,e:"Moving air helps us feel cooler."},

{q:"Which action can help keep the air around us cleaner?",o:["Planting trees","Burning plastic waste","Cutting trees","Keeping smoke inside rooms"],a:0,e:"Trees help improve air quality."},

{q:"Sunlight enters a room through a window. Tiny particles can be seen floating in the light. What are these particles?",o:["Dust particles","Leaves","Stones","Seeds"],a:0,e:"Dust particles can float in the air and become visible in sunlight."},

{q:"Why do wet clothes dry faster on a windy day than on a still day?",o:["Moving air helps water evaporate faster","Wind adds heat to clothes","Wind makes clothes heavier","Wind adds water to clothes"],a:0,e:"Moving air carries away water vapour and helps drying."},

{q:"A child covers both nose and mouth tightly for a long time. Why might this be a problem?",o:["The child may find it difficult to breathe","The child may grow taller","The child may feel colder","The child may run faster"],a:0,e:"We need air to breathe properly."},

{q:"Which activity depends least on air?",o:["Eating food","Flying a kite","Drying clothes","Breathing"],a:0,e:"Flying kites, drying clothes, and breathing depend directly on air."},

{q:"Factories release large amounts of smoke into the air. What problem may this cause?",o:["Breathing difficulties","Cleaner surroundings","More fresh air","More flowers"],a:0,e:"Smoke pollutes the air and can affect health."},

{q:"A child feels a gentle movement of air while sitting near a window. This moving air is called:",o:["Breeze","Storm","Smoke","Dust"],a:0,e:"A gentle movement of air is called a breeze."},

{q:"Weather reports warn people about strong winds. Why should people be careful?",o:["Strong winds can cause damage and danger","Strong winds make plants grow faster","Strong winds make air cleaner","Strong winds stop all rain"],a:0,e:"Storms and strong winds can damage property and trees."},

{q:"Look at the picture. What clue shows that the air is moving gently?",image:"assets/ch9_q12.png",o:["The leaves are bending slightly","The plant is growing","The soil is wet","The leaves are falling off"],a:0,e:"The gently moving leaves show a light breeze."},

{q:"Water from wet clothes disappears into the air as an invisible gas. What is this called?",o:["Water vapour","Smoke","Dust","Mud"],a:0,e:"Water vapour is water in gas form mixed with air."},

{q:"Why is it a good habit to open doors and windows every day?",o:["Fresh air can enter the room","More dust can enter","The room becomes darker","The furniture grows cleaner"],a:0,e:"Fresh air helps keep rooms healthy and comfortable."},

{q:"Your classroom feels hot and stuffy after lunch. What is the best thing to do first?",o:["Open windows for fresh air","Close all windows","Cover your nose","Turn off all fans"],a:0,e:"Fresh air improves comfort and ventilation."},

{q:"Why should you cover your mouth and nose when sneezing?",o:["To stop germs from spreading through the air","To make sneezing louder","To keep air out","To stop breathing"],a:0,e:"Covering your mouth and nose helps protect others from germs."},

{q:"Look at the picture. How are the children helping improve the air around their school?",image:"assets/ch9_q17.png",o:["By planting young trees","By cleaning desks","By watering roads","By collecting stones"],a:0,e:"Trees help make the air cleaner and healthier."},

{q:"Which action makes the air dirtier instead of cleaner?",o:["Burning plastic waste openly","Growing plants","Opening windows","Keeping surroundings clean"],a:0,e:"Burning plastic releases harmful smoke into the air."},

{q:"Why is it safer to stay indoors during very strong winds?",o:["Strong winds can cause accidents and damage","Strong winds help people run faster","Strong winds clean all roads","Strong winds make it easier to play"],a:0,e:"Strong winds can be dangerous."},

{q:"How does clean air help our body?",o:["It helps us stay healthy and active","It makes us sleepy all day","It makes us weaker","It stops us from exercising"],a:0,e:"Clean air helps us breathe properly and stay healthy."}
]

let current=0,score=0,attempts=0,timer,timeLeft=60,locked=false;
const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");

setTimeout(function(){showScreen("intro")},5000);

function showScreen(id){
const screens=document.querySelectorAll(".screen");
for(let i=0;i<screens.length;i++){screens[i].classList.remove("active")}
document.getElementById(id).classList.add("active");
}

function startGame(){score=0;current=0;showScreen("quiz");loadQuestion()}

function loadQuestion(){
locked=false;attempts=0;clearInterval(timer);timeLeft=60;
document.getElementById("time").textContent=timeLeft;
document.getElementById("score").textContent=score;
document.getElementById("qCount").textContent="Question "+(current+1)+"/"+questions.length;
const q=questions[current];
document.getElementById("question").textContent=q.q;
const imageContainer=document.getElementById("questionImageContainer");
imageContainer.innerHTML="";
if(q.image){const img=document.createElement("img");img.src=q.image;imageContainer.appendChild(img);}
document.getElementById("feedback").innerHTML="";
document.getElementById("nextBtn").classList.add("hidden");
document.getElementById("progressBar").style.width=((current)/questions.length)*100+"%";
const box=document.getElementById("options");
box.innerHTML="";
for(let i=0;i<q.o.length;i++){
const div=document.createElement("div");
div.className="option";
div.textContent=q.o[i];
div.onclick=function(){checkAnswer(i,div)};
box.appendChild(div);
}
startTimer();
}

function startTimer(){
timer=setInterval(function(){
timeLeft--;
document.getElementById("time").textContent=timeLeft;
if(timeLeft<=0){clearInterval(timer);showAnswer("Time is up!")}
},1000);
}

function checkAnswer(i,el){
if(locked){return}
const q=questions[current];
if(i===q.a){
locked=true;clearInterval(timer);score++;
document.getElementById("score").textContent=score;
el.classList.add("correct");
document.getElementById("feedback").innerHTML="Correct!<div class='explain'>"+q.e+"</div>";
playSound(correctSound);
setTimeout(function(){playSound(clapSound)},250);
makeConfetti();
document.getElementById("nextBtn").classList.remove("hidden");
}else{
attempts++;
el.classList.add("wrong");
showCross();
playSound(wrongSound);
if(attempts===1){
document.getElementById("feedback").innerHTML="Try once more.";
el.onclick=null;
}else{
showAnswer("Not quite.");
}
}
}

function showAnswer(msg){
locked=true;clearInterval(timer);
const q=questions[current];
const options=document.querySelectorAll(".option");
for(let i=0;i<options.length;i++){
options[i].onclick=null;
if(i===q.a){options[i].classList.add("correct")}
}
document.getElementById("feedback").innerHTML=msg+"<div class='explain'>Correct answer: <b>"+q.o[q.a]+"</b><br>"+q.e+"</div>";
document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion(){
current++;
if(current<questions.length){loadQuestion()}
else{document.getElementById("progressBar").style.width="100%";showResult()}
}

function showResult(){
showScreen("result");
document.getElementById("finalScore").textContent=score;
playSound(clapSound);
let msg="Good effort! Keep practising air, moving air, and clean air habits.";
if(score>=18){msg="Excellent! You understand air, breeze, storms, and clean air very well."}
else if(score>=14){msg="Well done! A little more practice will make it even better."}
document.getElementById("resultMsg").textContent=msg;
}

function makeConfetti(){
const box=document.getElementById("confetti");
for(let i=0;i<18;i++){
const s=document.createElement("div");
s.className="star";
s.textContent="⭐";
s.style.left=Math.random()*100+"vw";
s.style.top=(55+Math.random()*25)+"vh";
box.appendChild(s);
setTimeout(function(){s.remove()},900);
}
}

function showCross(){
const x=document.createElement("div");
x.className="cross";
x.textContent="✕";
document.body.appendChild(x);
setTimeout(function(){x.remove()},700);
}

function playSound(sound){
if(!sound){return}
try{
sound.currentTime=0;
const p=sound.play();
if(p!==undefined){p.catch(function(){})}
}catch(error){}
}
</script>

</body>
</html>
