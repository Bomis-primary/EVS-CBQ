<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 2: Parts of a Plant</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100%;font-family:Arial,sans-serif;background:#f4fbff;color:#263238;overflow-x:hidden}
body{background:linear-gradient(135deg,#f1ffe8,#e8f7ff,#fff7d6)}
.splash,.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;position:relative}
.splash{background:#fff}
.logo{max-width:220px;width:65%}
.card{width:100%;max-width:760px;background:rgba(255,255,255,.94);border-radius:26px;padding:22px;box-shadow:0 10px 30px rgba(0,0,0,.12);text-align:center;position:relative;z-index:2}
h1{font-size:clamp(25px,5vw,40px);margin:8px 0;color:#2e7d32}
h2{font-size:clamp(22px,4vw,32px);color:#2e7d32}
p{font-size:clamp(16px,3vw,19px);line-height:1.5}
button{border:0;border-radius:18px;padding:14px 18px;font-size:17px;font-weight:bold;cursor:pointer;background:#43a047;color:#fff;margin:8px;min-height:48px}
.topbar{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.badge{background:#e8f5e9;border-radius:999px;padding:9px 13px;font-weight:bold;color:#1b5e20}
.timer{background:#fff3e0;color:#e65100}
.question{font-size:clamp(18px,3.5vw,24px);font-weight:bold;margin:14px 0;text-align:left}
.options{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
.option{width:100%;background:#fff;color:#263238;border:2px solid #c8e6c9;text-align:left;border-radius:18px;padding:14px;font-size:clamp(16px,3vw,19px);font-weight:600}
.option.correct{background:#d8f8d0;border-color:#43a047}
.option.wrong{background:#ffe0e0;border-color:#e53935}
.feedback{min-height:58px;margin-top:14px;font-size:17px;font-weight:bold}
.explain{font-weight:normal;color:#37474f;margin-top:6px}
.hide{display:none}
.question-image-container{text-align:center;margin:10px auto 14px}
.question-image-container img{display:block;width:100%;max-width:280px;max-height:180px;object-fit:contain;margin:0 auto;border-radius:18px}
.bg span{position:fixed;font-size:24px;opacity:.22;animation:float 12s linear infinite;z-index:0}
.bg span:nth-child(1){left:8%;animation-delay:0s}
.bg span:nth-child(2){left:30%;animation-delay:3s}
.bg span:nth-child(3){left:58%;animation-delay:6s}
.bg span:nth-child(4){left:82%;animation-delay:9s}
@keyframes float{0%{top:105%;transform:rotate(0)}100%{top:-10%;transform:rotate(180deg)}}
.confetti{position:fixed;top:-20px;font-size:22px;animation:fall 900ms linear forwards;z-index:5}
@keyframes fall{to{transform:translateY(105vh) rotate(220deg);opacity:0}}
.cross{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);font-size:70px;color:#e53935;opacity:.85;z-index:6;animation:pop .55s ease forwards}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(.4)}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
@media(max-width:520px){
.card{padding:16px;border-radius:20px}
button{width:100%;margin:7px 0}
.topbar{font-size:14px}
}
</style>
</head>
<body>

<div class="bg"><span>🌿</span><span>⭐</span><span>🌱</span><span>✨</span></div>

<div id="splash" class="splash">
  <img src="assets/innovine-logo.png" class="logo" alt="Innovine Logo">
</div>

<div id="intro" class="screen hide">
  <div class="card">
    <h1>Parts of a Plant</h1>
    <p><b>Grade 3 EVS</b></p>
    <p>Answer each question carefully. You get one retry after a wrong answer. After the second wrong try, the correct answer will be shown.</p>
    <button onclick="startGame()">Start Quiz</button>
  </div>
</div>

<div id="quiz" class="screen hide">
  <div class="card">
    <div class="topbar">
      <div class="badge" id="progress">Question 1/20</div>
      <div class="badge">Score: <span id="score">0</span>/20</div>
      <div class="badge timer">Time: <span id="time">60</span>s</div>
    </div>

    <div id="imgBox" class="question-image-container hide">
      <img id="qImg" src="" alt="Question image">
    </div>

    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
    <div id="feedback" class="feedback"></div>
    <button id="nextBtn" class="hide" onclick="nextQuestion()">Next</button>
  </div>
</div>

<div id="result" class="screen hide">
  <div class="card">
    <h2>Quiz Complete!</h2>
    <p id="finalScore"></p>
    <h1 id="remark"></h1>
    <button onclick="restartGame()">Play Again</button>
  </div>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>
const questions=[
{q:"A student observes the picture and notices roots spreading through the soil. What is the most important job these roots perform for the plant?",image:"assets/ch2_q1.png",o:["Making flowers colourful","Holding the plant firmly in the soil and absorbing water","Preparing food for the plant","Producing fruits"],a:1,e:"Roots anchor the plant in the soil and absorb water and minerals needed for growth."},
{q:"A potted plant is watered regularly, but its roots are damaged while shifting it to another pot. What is most likely to happen?",o:["It may become weak and wilt","It will grow faster","It will produce more flowers","It will become taller immediately"],a:0,e:"Roots absorb water and minerals. Damaged roots affect the plant’s survival."},
{q:"A farmer grows carrot, radish and beetroot in one section of his field. Why can these plants be grouped together?",o:["They all have colourful flowers","They store food in their roots","They grow only in summer","They do not need water"],a:1,e:"These plants store food in thick roots."},
{q:"A child places a white flower in coloured water. After a few hours, the petals begin to change colour. What does this show?",o:["Flowers make food","Stems carry water to different parts of the plant","Roots make flowers colourful","Leaves absorb colours"],a:1,e:"The coloured water travels through the stem to the flower."},
{q:"A green plant is kept inside a dark cupboard for several days. Why might it become weak?",o:["Leaves cannot make enough food without sunlight","Flowers fall asleep","Roots stop growing immediately","Stems become stronger"],a:0,e:"Sunlight is needed for leaves to prepare food."},
{q:"Your friend wants to pluck all the flowers from a garden for decoration. What is the best advice?",o:["Pluck every flower","Protect the flowers and pluck only when necessary","Remove the whole plant","Ignore the situation"],a:1,e:"Flowers help plants reproduce and should be protected."},
{q:"A plant has healthy roots, stem and leaves, but all its flowers are removed before seeds can form. Which important job of the plant may be affected?",o:["Reproduction","Absorbing water","Holding the plant upright","Transporting water"],a:0,e:"Flowers help plants reproduce and form seeds."},
{q:"A student says, “Leaves only make the plant look beautiful.” Why is this statement incorrect?",o:["Leaves prepare food for the plant","Leaves produce roots","Leaves make fruits directly","Leaves hold the soil"],a:0,e:"Leaves play an important role in food preparation."},
{q:"A gardener notices many bees visiting flowers in the garden. Why is this helpful?",o:["Bees help in pollination","Bees water the plants","Bees make roots stronger","Bees stop fruits from growing"],a:0,e:"Pollination helps plants produce fruits and seeds."},
{q:"A child pulls a carrot out of the soil and notices that the part eaten as food grows underground. Which plant part is the child eating?",o:["Root","Stem","Leaf","Flower"],a:0,e:"Carrot stores food in its root."},
{q:"A child finds small plants growing in different corners of the garden. What is the most likely reason?",o:["Seeds were dispersed and germinated there","Flowers moved by themselves","Roots walked to new places","Leaves changed into plants"],a:0,e:"New plants often grow where dispersed seeds germinate."},
{q:"A gardener wants a plant to produce new plants naturally in the future. Which plant parts are most important for this purpose?",o:["Flower, fruit and seed","Root, stem and leaf","Leaf, stem and flower","Root, fruit and leaf"],a:0,e:"Flowers, fruits and seeds help in reproduction."},
{q:"A child places a seed on moist cotton and observes a tiny root emerging first. What does this indicate?",o:["Germination has started","Pollination has occurred","The seed is dying","The flower is growing"],a:0,e:"The first stage of germination is the emergence of a root."},
{q:"Many leaves are removed from a healthy plant. What effect is most likely?",o:["The plant may not make enough food","The roots stop existing","Fruits appear immediately","Flowers become bigger"],a:0,e:"Leaves are important for food preparation."},
{q:"A family is serving food on banana leaves during a traditional meal. What does this suggest about some leaves?",image:"assets/ch2_q15.png",o:["They can be useful in everyday life besides helping the plant survive","They grow underground","They produce roots directly","They change into flowers"],a:0,e:"Some leaves, such as banana leaves, are used by people for purposes like serving food."},
{q:"Students are asked to improve the school garden. Which action will help plants grow better?",o:["Watering plants regularly","Breaking branches","Removing all leaves","Walking over roots"],a:0,e:"Plants need water for healthy growth."},
{q:"Why should we avoid damaging young plants?",o:["They are living things that need care and time to grow","They are expensive","They cannot make seeds","They never grow again"],a:0,e:"Plants are living organisms and deserve care."},
{q:"A farmer wants to grow a crop with fibrous roots. Which plant would be the best choice?",o:["Wheat","Carrot","Radish","Beetroot"],a:0,e:"Wheat commonly has fibrous roots, unlike storage roots."},
{q:"A student wants to find out whether stems transport water. Which activity would give the best evidence?",o:["Place a white flower in coloured water and observe changes","Smell a flower","Count leaves","Touch the stem"],a:0,e:"The movement of coloured water shows water transport through the stem."},
{q:"A plant cannot survive if only one part works properly while the others stop functioning. What does this show?",o:["Plant parts depend on one another to survive","Leaves are the only important part","Roots are unnecessary","Flowers do all the work"],a:0,e:"All plant parts work together as a system."}
];

let index=0,score=0,tries=0,timer,timeLeft=60,locked=false;

setTimeout(()=>{splash.classList.add("hide");intro.classList.remove("hide")},5000);

function startGame(){
index=0;score=0;tries=0;
intro.classList.add("hide");
quiz.classList.remove("hide");
showQuestion();
}

function showQuestion(){
locked=false;
tries=0;
clearInterval(timer);
timeLeft=60;
time.textContent=timeLeft;
scoreEl();
progress.textContent=`Question ${index+1}/${questions.length}`;
feedback.innerHTML="";
nextBtn.classList.add("hide");

const q=questions[index];
question.textContent=q.q;

if(q.image){
qImg.src=q.image;
imgBox.classList.remove("hide");
}else{
qImg.src="";
imgBox.classList.add("hide");
}

options.innerHTML="";
q.o.forEach((opt,i)=>{
const btn=document.createElement("button");
btn.className="option";
btn.textContent=opt;
btn.onclick=()=>checkAnswer(btn,i);
options.appendChild(btn);
});

timer=setInterval(()=>{
timeLeft--;
time.textContent=timeLeft;
if(timeLeft<=0){
clearInterval(timer);
showAnswer("Time is up!");
}
},1000);
}

function checkAnswer(btn,chosen){
if(locked)return;
const q=questions[index];
if(chosen===q.a){
locked=true;
clearInterval(timer);
score++;
btn.classList.add("correct");
scoreEl();
feedback.innerHTML=`Correct!<div class="explain">${q.e}</div>`;
playCorrect();
starConfetti();
nextBtn.classList.remove("hide");
}else{
tries++;
btn.classList.add("wrong");
playWrong();
redCross();
if(tries===1){
feedback.textContent="Try once more.";
btn.disabled=true;
}else{
showAnswer("Not quite.");
}
}
}

function showAnswer(msg){
locked=true;
clearInterval(timer);
const q=questions[index];
document.querySelectorAll(".option").forEach((b,i)=>{
b.disabled=true;
if(i===q.a)b.classList.add("correct");
});
feedback.innerHTML=`${msg} Correct answer: ${q.o[q.a]}<div class="explain">${q.e}</div>`;
nextBtn.classList.remove("hide");
}

function nextQuestion(){
index++;
if(index<questions.length)showQuestion();
else showResult();
}

function showResult(){
quiz.classList.add("hide");
result.classList.remove("hide");
finalScore.textContent=`Score: ${score}/${questions.length}`;
remark.textContent=score>=18?"Excellent":score>=14?"Well Done":"Good Effort";
}

function restartGame(){
result.classList.add("hide");
intro.classList.remove("hide");
}

function scoreEl(){
document.getElementById("score").textContent=score;
}

function playCorrect(){
correctSound.play().catch(()=>{});
setTimeout(()=>clapSound.play().catch(()=>{}),350);
}

function playWrong(){
wrongSound.play().catch(()=>{});
}

function starConfetti(){
for(let i=0;i<18;i++){
const s=document.createElement("div");
s.className="confetti";
s.textContent="⭐";
s.style.left=Math.random()*100+"vw";
s.style.animationDelay=Math.random()*250+"ms";
document.body.appendChild(s);
setTimeout(()=>s.remove(),1200);
}
}

function redCross(){
const x=document.createElement("div");
x.className="cross";
x.textContent="✖";
document.body.appendChild(x);
setTimeout(()=>x.remove(),600);
}
</script>
</body>
</html>
