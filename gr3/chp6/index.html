<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 6: Birds</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100%;font-family:Arial,sans-serif;color:#263238;overflow-x:hidden}
body{background:linear-gradient(135deg,#e8f7ff,#fff7d6,#f3ecff)}
.splash,.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;position:relative}
.splash{background:#fff}
.logo{max-width:220px;width:65%}
.card{width:100%;max-width:760px;background:rgba(255,255,255,.95);border-radius:26px;padding:22px;box-shadow:0 10px 30px rgba(0,0,0,.12);text-align:center;position:relative;z-index:2}
h1{font-size:clamp(25px,5vw,40px);margin:8px 0;color:#1565c0}
h2{font-size:clamp(22px,4vw,32px);color:#1565c0}
p{font-size:clamp(16px,3vw,19px);line-height:1.5}
button{border:0;border-radius:18px;padding:14px 18px;font-size:17px;font-weight:bold;cursor:pointer;background:#1976d2;color:#fff;margin:8px;min-height:48px}
.topbar{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.badge{background:#e3f2fd;border-radius:999px;padding:9px 13px;font-weight:bold;color:#0d47a1}
.timer{background:#fff3e0;color:#e65100}
.question{font-size:clamp(18px,3.5vw,24px);font-weight:bold;margin:14px 0;text-align:left}
.options{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
.option{width:100%;background:#fff;color:#263238;border:2px solid #bbdefb;text-align:left;border-radius:18px;padding:14px;font-size:clamp(16px,3vw,19px);font-weight:600}
.option.correct{background:#d8f8d0;border-color:#43a047}
.option.wrong{background:#ffe0e0;border-color:#e53935}
.feedback{min-height:58px;margin-top:14px;font-size:17px;font-weight:bold}
.explain{font-weight:normal;color:#37474f;margin-top:6px}
.hide{display:none}
.question-image-container{text-align:center;margin:10px auto 14px}
.question-image-container img{display:block;width:100%;max-width:280px;max-height:180px;object-fit:contain;margin:0 auto;border-radius:18px}
.bg span{position:fixed;font-size:24px;opacity:.22;animation:float 12s linear infinite;z-index:0}
.bg span:nth-child(1){left:8%;animation-delay:0s}
.bg span:nth-child(2){left:30%;animation-delay:3s}
.bg span:nth-child(3){left:58%;animation-delay:6s}
.bg span:nth-child(4){left:82%;animation-delay:9s}
@keyframes float{0%{top:105%;transform:rotate(0)}100%{top:-10%;transform:rotate(180deg)}}
.confetti{position:fixed;top:-20px;font-size:22px;animation:fall 900ms linear forwards;z-index:5}
@keyframes fall{to{transform:translateY(105vh) rotate(220deg);opacity:0}}
.cross{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);font-size:70px;color:#e53935;opacity:.85;z-index:6;animation:pop .55s ease forwards}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(.4)}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
@media(max-width:520px){.card{padding:16px;border-radius:20px}button{width:100%;margin:7px 0}.topbar{font-size:14px}}
</style>
</head>
<body>

<div class="bg"><span>⭐</span><span>🪶</span><span>✨</span><span>🐦</span></div>

<div id="splash" class="splash">
  <img src="assets/innovine-logo.png" class="logo" alt="Innovine Logo">
</div>

<div id="intro" class="screen hide">
  <div class="card">
    <h1>Birds</h1>
    <p><b>Grade 3 EVS</b></p>
    <p>Answer carefully. You get one retry after a wrong answer. After the second wrong try, the correct answer and explanation will appear.</p>
    <button onclick="startGame()">Start Quiz</button>
  </div>
</div>

<div id="quiz" class="screen hide">
  <div class="card">
    <div class="topbar">
      <div class="badge" id="progress">Question 1/20</div>
      <div class="badge">Score: <span id="score">0</span>/20</div>
      <div class="badge timer">Time: <span id="time">60</span>s</div>
    </div>
    <div id="imgBox" class="question-image-container hide">
      <img id="qImg" src="" alt="Question image">
    </div>
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
    <div id="feedback" class="feedback"></div>
    <button id="nextBtn" class="hide" onclick="nextQuestion()">Next</button>
  </div>
</div>

<div id="result" class="screen hide">
  <div class="card">
    <h2>Quiz Complete!</h2>
    <p id="finalScore"></p>
    <h1 id="remark"></h1>
    <button onclick="restartGame()">Play Again</button>
  </div>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>
const questions=[
{q:"The duck in the picture is moving easily through water. Which feature helps it swim efficiently?",image:"assets/ch6_q1.png",o:["Hooked beak","Webbed feet","Talons","Curved beak"],a:1,e:"Webbed feet act like paddles and help ducks move through water."},
{q:"A sparrow can fly quickly from one tree to another. Which body feature helps it most?",o:["Hollow and light bones","Heavy bones","Thick skin","Sharp claws only"],a:0,e:"Light, hollow bones reduce body weight and help birds fly."},
{q:"A bird uses its strong curved beak to crack hard nuts and seeds. Which bird is most likely being described?",o:["Parrot","Duck","Eagle","Crane"],a:0,e:"Parrots have strong curved beaks that help them crack seeds and nuts."},
{q:"Why do eagles have strong hooked beaks?",o:["To tear flesh easily","To swim faster","To build nests","To collect nectar"],a:0,e:"Hooked beaks help birds of prey tear meat."},
{q:"A bird catches a mouse and carries it away using its strong feet. Which type of feet is helping the bird?",o:["Talons","Webbed feet","Wading feet","Climbing claws"],a:0,e:"Birds of prey use strong talons to catch and hold prey."},
{q:"During summer, many birds visit your balcony looking for water. What is the best action?",o:["Keep a bowl of clean water outside","Remove all plants","Chase the birds away","Cover the balcony completely"],a:0,e:"Providing water helps birds survive during hot weather."},
{q:"Why do different birds have different types of beaks?",o:["Their beaks are adapted to the food they eat","Beaks change colour with age","All birds eat the same food","Beaks help birds sleep"],a:0,e:"Bird beaks are adapted to different feeding habits."},
{q:"A student says, “All birds can fly.” Why is this statement incorrect?",o:["Some birds like ostriches and penguins cannot fly","Birds do not have wings","Flying is not related to birds","Birds only walk"],a:0,e:"While most birds fly, some birds are flightless."},
{q:"A bird is collecting dry grass, twigs and threads. What is the most likely reason?",o:["To build a nest","To make food","To sharpen its beak","To attract rain"],a:0,e:"Birds use various materials to build nests."},
{q:"A child is making a chart of birds. Which of these should NOT be included?",o:["Eagle","Duck","Woodpecker","Butterfly"],a:3,e:"A butterfly is an insect, not a bird."},
{q:"A mother bird sits on her eggs for many days. Why is this important?",o:["It keeps the eggs warm until they hatch","It teaches chicks to fly","It helps eggs change colour","It makes the nest larger"],a:0,e:"Warmth is needed for the development of chicks inside eggs."},
{q:"A bird sings loudly from a tree early in the morning. Why might it do this?",o:["To communicate with other birds","To make the tree grow","To increase sunlight","To change its feathers"],a:0,e:"Birds use sounds to communicate and warn others."},
{q:"A bird is searching for food in a pond and filtering tiny food particles from water. Which type of beak would help it most?",o:["Broad and flat beak","Strong hooked beak","Short curved beak","Chisel-shaped beak"],a:0,e:"Ducks use broad, flat beaks to filter food from water."},
{q:"The bird in the picture is able to hold onto the tree trunk while climbing. Which adaptation helps it do this?",image:"assets/ch6_q14.png",o:["Climbing claws","Webbed feet","Wading feet","Broad beak"],a:0,e:"Climbing claws help woodpeckers grip tree trunks securely."},
{q:"Children are disturbing a nest containing eggs. What should be done?",o:["Leave the nest undisturbed and protect it","Touch the eggs","Remove the nest","Throw the eggs away"],a:0,e:"Nests and eggs should be protected from disturbance."},
{q:"Why is a bird's tail important during flight?",o:["It helps in balancing and changing direction","It helps in chewing food","It stores water","It protects eggs"],a:0,e:"The tail acts like a steering tool during flight."},
{q:"Why should we avoid destroying birds' nests?",o:["Birds need safe places to lay eggs and raise young ones","Nests are used only in winter","Birds can instantly build a new nest anywhere","Nests have no purpose"],a:0,e:"Nests provide protection and safety for eggs and chicks."},
{q:"A crane spends much of its time standing in shallow water while searching for food. Which feature helps it most?",o:["Long wading legs","Webbed feet","Talons","Curved claws"],a:0,e:"Long legs help cranes move through shallow water."},
{q:"A bird with injured wings cannot fly properly. Which challenge is it most likely to face first?",o:["Difficulty finding food and escaping danger","Difficulty growing feathers","Difficulty laying eggs immediately","Difficulty changing colour"],a:0,e:"Flight helps birds find food and avoid predators."},
{q:"Birds help nature by spreading seeds and controlling insects. What does this show?",o:["Birds play an important role in maintaining ecological balance","Birds are useful only for their songs","Birds are important only in cities","Birds help only other birds"],a:0,e:"Birds contribute to healthy ecosystems in many ways."}
];

let index=0,score=0,tries=0,timer,timeLeft=60,locked=false;

setTimeout(()=>{splash.classList.add("hide");intro.classList.remove("hide")},5000);

function startGame(){
index=0;score=0;tries=0;
intro.classList.add("hide");
quiz.classList.remove("hide");
showQuestion();
}

function showQuestion(){
locked=false;
tries=0;
clearInterval(timer);
timeLeft=60;
time.textContent=timeLeft;
document.getElementById("score").textContent=score;
progress.textContent=`Question ${index+1}/${questions.length}`;
feedback.innerHTML="";
nextBtn.classList.add("hide");

const q=questions[index];
question.textContent=q.q;

if(q.image){
qImg.src=q.image;
imgBox.classList.remove("hide");
}else{
qImg.src="";
imgBox.classList.add("hide");
}

options.innerHTML="";
q.o.forEach((opt,i)=>{
const btn=document.createElement("button");
btn.className="option";
btn.textContent=opt;
btn.onclick=()=>checkAnswer(btn,i);
options.appendChild(btn);
});

timer=setInterval(()=>{
timeLeft--;
time.textContent=timeLeft;
if(timeLeft<=0){
clearInterval(timer);
showAnswer("Time is up!");
}
},1000);
}

function checkAnswer(btn,chosen){
if(locked)return;
const q=questions[index];
if(chosen===q.a){
locked=true;
clearInterval(timer);
score++;
btn.classList.add("correct");
document.getElementById("score").textContent=score;
feedback.innerHTML=`Correct!<div class="explain">${q.e}</div>`;
playCorrect();
starConfetti();
nextBtn.classList.remove("hide");
}else{
tries++;
btn.classList.add("wrong");
playWrong();
redCross();
if(tries===1){
feedback.textContent="Try once more.";
btn.disabled=true;
}else{
showAnswer("Not quite.");
}
}
}

function showAnswer(msg){
locked=true;
clearInterval(timer);
const q=questions[index];
document.querySelectorAll(".option").forEach((b,i)=>{
b.disabled=true;
if(i===q.a)b.classList.add("correct");
});
feedback.innerHTML=`${msg} Correct answer: ${q.o[q.a]}<div class="explain">${q.e}</div>`;
nextBtn.classList.remove("hide");
}

function nextQuestion(){
index++;
if(index<questions.length)showQuestion();
else showResult();
}

function showResult(){
quiz.classList.add("hide");
result.classList.remove("hide");
finalScore.textContent=`Score: ${score}/${questions.length}`;
remark.textContent=score>=18?"Excellent":score>=14?"Well Done":"Good Effort";
}

function restartGame(){
result.classList.add("hide");
intro.classList.remove("hide");
}

function playCorrect(){
correctSound.play().catch(()=>{});
setTimeout(()=>clapSound.play().catch(()=>{}),350);
}

function playWrong(){
wrongSound.play().catch(()=>{});
}

function starConfetti(){
for(let i=0;i<18;i++){
const s=document.createElement("div");
s.className="confetti";
s.textContent="⭐";
s.style.left=Math.random()*100+"vw";
s.style.animationDelay=Math.random()*250+"ms";
document.body.appendChild(s);
setTimeout(()=>s.remove(),1200);
}
}

function redCross(){
const x=document.createElement("div");
x.className="cross";
x.textContent="✖";
document.body.appendChild(x);
setTimeout(()=>x.remove(),600);
}
</script>
</body>
</html>
