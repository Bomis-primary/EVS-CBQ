<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 11: The Earth</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100%;font-family:Arial,sans-serif;color:#263238;overflow-x:hidden}
body{background:linear-gradient(135deg,#e8f7ff,#f1ffe8,#fff7d6)}
.splash,.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;position:relative}
.splash{background:#fff}
.logo{max-width:220px;width:65%}
.card{width:100%;max-width:760px;background:rgba(255,255,255,.95);border-radius:26px;padding:22px;box-shadow:0 10px 30px rgba(0,0,0,.12);text-align:center;position:relative;z-index:2}
h1{font-size:clamp(25px,5vw,40px);margin:8px 0;color:#2e7d32}
h2{font-size:clamp(22px,4vw,32px);color:#2e7d32}
p{font-size:clamp(16px,3vw,19px);line-height:1.5}
button{border:0;border-radius:18px;padding:14px 18px;font-size:17px;font-weight:bold;cursor:pointer;background:#43a047;color:#fff;margin:8px;min-height:48px}
.topbar{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.badge{background:#e8f5e9;border-radius:999px;padding:9px 13px;font-weight:bold;color:#1b5e20}
.timer{background:#fff3e0;color:#e65100}
.question{font-size:clamp(18px,3.5vw,24px);font-weight:bold;margin:14px 0;text-align:left}
.options{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
.option{width:100%;background:#fff;color:#263238;border:2px solid #c8e6c9;text-align:left;border-radius:18px;padding:14px;font-size:clamp(16px,3vw,19px);font-weight:600}
.option.correct{background:#d8f8d0;border-color:#43a047}
.option.wrong{background:#ffe0e0;border-color:#e53935}
.feedback{min-height:58px;margin-top:14px;font-size:17px;font-weight:bold}
.explain{font-weight:normal;color:#37474f;margin-top:6px}
.hide{display:none}
.question-image-container{text-align:center;margin:10px auto 14px}
.question-image-container img{display:block;width:100%;max-width:280px;max-height:180px;object-fit:contain;margin:0 auto;border-radius:18px}
.bg span{position:fixed;font-size:24px;opacity:.22;animation:float 12s linear infinite;z-index:0}
.bg span:nth-child(1){left:8%;animation-delay:0s}
.bg span:nth-child(2){left:30%;animation-delay:3s}
.bg span:nth-child(3){left:58%;animation-delay:6s}
.bg span:nth-child(4){left:82%;animation-delay:9s}
@keyframes float{0%{top:105%;transform:rotate(0)}100%{top:-10%;transform:rotate(180deg)}}
.confetti{position:fixed;top:-20px;font-size:22px;animation:fall 900ms linear forwards;z-index:5}
@keyframes fall{to{transform:translateY(105vh) rotate(220deg);opacity:0}}
.cross{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);font-size:70px;color:#e53935;opacity:.85;z-index:6;animation:pop .55s ease forwards}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(.4)}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
@media(max-width:520px){.card{padding:16px;border-radius:20px}button{width:100%;margin:7px 0}.topbar{font-size:14px}}
</style>
</head>
<body>

<div class="bg"><span>⭐</span><span>🌍</span><span>✨</span><span>🧭</span></div>

<div id="splash" class="splash">
  <img src="assets/innovine-logo.png" class="logo" alt="Innovine Logo">
</div>

<div id="intro" class="screen hide">
  <div class="card">
    <h1>The Earth</h1>
    <p><b>Grade 3 EVS</b></p>
    <p>Answer carefully. You get one retry after a wrong answer. After the second wrong try, the correct answer and explanation will appear.</p>
    <button onclick="startGame()">Start Quiz</button>
  </div>
</div>

<div id="quiz" class="screen hide">
  <div class="card">
    <div class="topbar">
      <div class="badge" id="progress">Question 1/20</div>
      <div class="badge">Score: <span id="score">0</span>/20</div>
      <div class="badge timer">Time: <span id="time">60</span>s</div>
    </div>
    <div id="imgBox" class="question-image-container hide">
      <img id="qImg" src="" alt="Question image">
    </div>
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
    <div id="feedback" class="feedback"></div>
    <button id="nextBtn" class="hide" onclick="nextQuestion()">Next</button>
  </div>
</div>

<div id="result" class="screen hide">
  <div class="card">
    <h2>Quiz Complete!</h2>
    <p id="finalScore"></p>
    <h1 id="remark"></h1>
    <button onclick="restartGame()">Play Again</button>
  </div>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clapping.mp3"></audio>

<script>
const questions=[
{q:"The astronauts in the picture are observing Earth from space. What can be concluded from what they see?",image:"assets/ch11_q1.png",o:["Earth is spherical in shape","Earth is flat","Earth is square","Earth is triangular"],a:0,e:"Photographs and observations from space show that Earth is round like a sphere."},
{q:"A ship moving away in the sea disappears gradually from the bottom first. What does this suggest?",o:["Earth is curved or spherical","The ship becomes invisible","The sea is shallow","The ship changes shape"],a:0,e:"This observation supports the idea that Earth is spherical."},
{q:"Scientists search for planets with air and water. Why?",o:["Air and water are important for supporting life","Air and water make planets larger","Air and water create stars","Air and water stop movement"],a:0,e:"Life as we know it depends on air and water."},
{q:"Why would life become difficult without Earth's atmosphere?",o:["Living things would not get the air they need","Mountains would disappear","Oceans would freeze immediately","Continents would move away"],a:0,e:"The atmosphere provides air and protects life on Earth."},
{q:"A scientist is comparing planets to find one that may support life. Which combination of features would be most helpful?",o:["Air, water and suitable temperature","Mountains, roads and bridges","Rivers, buildings and vehicles","Clouds, traffic and soil only"],a:0,e:"Air, water and suitable temperatures are important conditions for life."},
{q:"Your school wants to start an environmental project. Which activity would help Earth the most?",o:["Planting and caring for trees","Burning waste","Throwing litter on the ground","Wasting water"],a:0,e:"Trees improve air quality and support life."},
{q:"Why is Earth often called a unique planet?",o:["It supports life","It is the largest planet","It never moves","It has no atmosphere"],a:0,e:"Earth has conditions suitable for living things."},
{q:"A student says, “Earth is a star because it moves around the Sun.” Why is this incorrect?",o:["Earth is a planet, not a star","Earth does not move","Stars move around Earth","Planets are larger than stars"],a:0,e:"Earth is a planet that revolves around the Sun."},
{q:"While it is daytime in India, it is nighttime in some other countries. What is the best explanation?",o:["Different parts of Earth face the Sun at different times","The Sun shines only on India","The Moon blocks sunlight","Earth stops moving"],a:0,e:"Earth's rotation causes day and night."},
{q:"A student is making two groups: “Continents” and “Oceans.” Which item should be placed in the “Oceans” group?",o:["Pacific Ocean","Asia","Europe","Africa"],a:0,e:"The Pacific Ocean is an ocean, while the others are continents."},
{q:"A child asks why we experience both day and night every 24 hours. Which explanation is correct?",o:["Earth rotates on its axis","Earth revolves around the Moon","The Sun moves around Earth","Clouds cover the Sun"],a:0,e:"Earth's rotation causes day and night."},
{q:"Why do seasons change during the year?",o:["Earth revolves around the Sun","Earth stops rotating","Oceans become warmer","Clouds change direction"],a:0,e:"Earth's revolution around the Sun causes seasonal changes."},
{q:"A traveller reaches a place that is high above the surrounding land but has a flat top. Which landform is it?",o:["Plateau","Valley","Island","Desert"],a:0,e:"Plateaus are elevated areas with flat tops."},
{q:"A traveller uses the object shown in the picture while exploring a new area. How does it help?",image:"assets/ch11_q14.png",o:["It helps find directions","It measures rainfall","It measures temperature","It predicts earthquakes"],a:0,e:"A compass helps people identify directions such as north, south, east and west."},
{q:"You notice people throwing waste into a river. What should you do?",o:["Encourage proper waste disposal and awareness","Join them","Ignore the problem","Throw more waste"],a:0,e:"Protecting natural resources is everyone's responsibility."},
{q:"Why are oceans important for life on Earth?",o:["They store large amounts of water and support living organisms","They create mountains","They stop Earth's movement","They replace the atmosphere"],a:0,e:"Oceans are important parts of Earth's ecosystem."},
{q:"Why should we conserve natural resources?",o:["Future generations will also need them","Resources never run out","Only animals use them","Conservation is unnecessary"],a:0,e:"Responsible use helps ensure resources remain available."},
{q:"A student wants to locate a city on a map. Which knowledge will help most?",o:["Understanding directions and map symbols","Knowing cooking methods","Understanding food chains","Knowing moon phases"],a:0,e:"Maps use directions and symbols to show locations."},
{q:"A farmer chooses to grow crops on a fertile plain instead of a steep mountain. Why?",o:["Plains are generally more suitable for farming","Mountains have no soil","Plains have no weather","Mountains cannot support life"],a:0,e:"Plains usually provide fertile land and easier farming conditions."},
{q:"Earth's atmosphere, land, water and living things are all connected. What does this show?",o:["Earth works as an interconnected system that supports life","Only land is important","Oceans and air are unrelated","Living things do not depend on nature"],a:0,e:"Different parts of Earth work together to support life."}
];

let index=0,score=0,tries=0,timer,timeLeft=60,locked=false;

setTimeout(()=>{splash.classList.add("hide");intro.classList.remove("hide")},5000);

function startGame(){
index=0;score=0;tries=0;
intro.classList.add("hide");
quiz.classList.remove("hide");
showQuestion();
}

function showQuestion(){
locked=false;
tries=0;
clearInterval(timer);
timeLeft=60;
time.textContent=timeLeft;
document.getElementById("score").textContent=score;
progress.textContent=`Question ${index+1}/${questions.length}`;
feedback.innerHTML="";
nextBtn.classList.add("hide");

const q=questions[index];
question.textContent=q.q;

if(q.image){
qImg.src=q.image;
imgBox.classList.remove("hide");
}else{
qImg.src="";
imgBox.classList.add("hide");
}

options.innerHTML="";
q.o.forEach((opt,i)=>{
const btn=document.createElement("button");
btn.className="option";
btn.textContent=opt;
btn.onclick=()=>checkAnswer(btn,i);
options.appendChild(btn);
});

timer=setInterval(()=>{
timeLeft--;
time.textContent=timeLeft;
if(timeLeft<=0){
clearInterval(timer);
showAnswer("Time is up!");
}
},1000);
}

function checkAnswer(btn,chosen){
if(locked)return;
const q=questions[index];
if(chosen===q.a){
locked=true;
clearInterval(timer);
score++;
btn.classList.add("correct");
document.getElementById("score").textContent=score;
feedback.innerHTML=`Correct!<div class="explain">${q.e}</div>`;
playCorrect();
starConfetti();
nextBtn.classList.remove("hide");
}else{
tries++;
btn.classList.add("wrong");
playWrong();
redCross();
if(tries===1){
feedback.textContent="Try once more.";
btn.disabled=true;
}else{
showAnswer("Not quite.");
}
}
}

function showAnswer(msg){
locked=true;
clearInterval(timer);
const q=questions[index];
document.querySelectorAll(".option").forEach((b,i)=>{
b.disabled=true;
if(i===q.a)b.classList.add("correct");
});
feedback.innerHTML=`${msg} Correct answer: ${q.o[q.a]}<div class="explain">${q.e}</div>`;
nextBtn.classList.remove("hide");
}

function nextQuestion(){
index++;
if(index<questions.length)showQuestion();
else showResult();
}

function showResult(){
quiz.classList.add("hide");
result.classList.remove("hide");
finalScore.textContent=`Score: ${score}/${questions.length}`;
remark.textContent=score>=18?"Excellent":score>=14?"Well Done":"Good Effort";
}

function restartGame(){
result.classList.add("hide");
intro.classList.remove("hide");
}

function playCorrect(){
correctSound.play().catch(()=>{});
setTimeout(()=>clapSound.play().catch(()=>{}),350);
}

function playWrong(){
wrongSound.play().catch(()=>{});
}

function starConfetti(){
for(let i=0;i<18;i++){
const s=document.createElement("div");
s.className="confetti";
s.textContent="⭐";
s.style.left=Math.random()*100+"vw";
s.style.animationDelay=Math.random()*250+"ms";
document.body.appendChild(s);
setTimeout(()=>s.remove(),1200);
}
}

function redCross(){
const x=document.createElement("div");
x.className="cross";
x.textContent="✖";
document.body.appendChild(x);
setTimeout(()=>x.remove(),600);
}
</script>
</body>
</html>
