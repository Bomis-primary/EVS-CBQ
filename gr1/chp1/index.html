<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Chapter 1: Me and My Body</title>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  overflow-x:hidden;
}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#fff7d6,#e3f7ff,#f3e8ff);
  color:#263238;
}

.bg span{
  position:fixed;
  top:-30px;
  font-size:22px;
  opacity:.22;
  animation:float 14s linear infinite;
  z-index:0;
}

.bg span:nth-child(1){left:8%;animation-delay:0s}
.bg span:nth-child(2){left:28%;animation-delay:3s}
.bg span:nth-child(3){left:52%;animation-delay:6s}
.bg span:nth-child(4){left:76%;animation-delay:2s}
.bg span:nth-child(5){left:92%;animation-delay:5s}

@keyframes float{
  from{transform:translateY(-40px) rotate(0deg)}
  to{transform:translateY(110vh) rotate(180deg)}
}

.screen{
  display:none;
  min-height:100vh;
  padding:16px;
  position:relative;
  z-index:1;
}

.active{
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:92vw;
  max-width:760px;
  background:rgba(255,255,255,.96);
  border-radius:26px;
  padding:22px;
  box-shadow:0 10px 26px rgba(0,0,0,.13);
  text-align:center;
}

.logo{
  width:180px;
  max-width:70%;
  height:auto;
  margin-bottom:18px;
}

h1{
  color:#1565c0;
  margin:10px 0;
  font-size:36px;
  line-height:1.15;
}

h2{
  color:#00796b;
  margin:8px 0;
  font-size:24px;
}

p{
  font-size:18px;
  line-height:1.45;
}

button{
  border:0;
  border-radius:18px;
  padding:15px 24px;
  margin:8px;
  font-size:18px;
  font-weight:bold;
  background:#ffca28;
  color:#263238;
  cursor:pointer;
  box-shadow:0 5px 0 #f9a825;
  min-height:54px;
}

button:active{
  transform:translateY(3px);
  box-shadow:0 2px 0 #f9a825;
}

.topbar{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:14px;
  font-weight:bold;
}

.badge{
  background:#e3f2fd;
  border-radius:16px;
  padding:10px 8px;
  text-align:center;
  font-size:16px;
}

.timer{
  background:#fff3e0;
}

.progress-wrap{
  width:100%;
  height:12px;
  background:#e0e0e0;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:16px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#66bb6a;
  transition:.3s;
}

.question{
  font-size:24px;
  line-height:1.4;
  font-weight:bold;
  margin:22px 0 12px;
}
.question-image-wrap{
  margin:10px auto 14px;
  text-align:center;
}

.question-image{
  max-width:100%;
  width:260px;
  max-height:220px;
  object-fit:contain;
  border-radius:18px;
  background:#ffffff;
}


.options{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.option{
  background:#f1f8e9;
  border:2px solid #c5e1a5;
  border-radius:18px;
  padding:18px;
  font-size:20px;
  min-height:70px;
  display:flex;
  align-items:center;
  cursor:pointer;
  text-align:left;
  line-height:1.3;
}

.option:hover{
  background:#e8f5e9;
}

.correct{
  background:#c8f7c5!important;
  border-color:#2e7d32!important;
  transform:scale(1.01);
}

.wrong{
  background:#ffcdd2!important;
  border-color:#c62828!important;
}

.feedback{
  min-height:62px;
  margin-top:16px;
  font-size:18px;
  font-weight:bold;
}

.explain{
  font-size:16px;
  font-weight:normal;
  margin-top:6px;
  line-height:1.4;
}

.hidden{
  display:none;
}

.confetti{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:3;
}

.star{
  position:absolute;
  font-size:24px;
  animation:pop 900ms ease-out forwards;
}

@keyframes pop{
  0%{transform:scale(.3) translateY(0);opacity:1}
  100%{transform:scale(1.4) translateY(-120px);opacity:0}
}

.cross{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:88px;
  color:#e53935;
  opacity:0;
  z-index:4;
  animation:crossfade 700ms ease-out;
}

@keyframes crossfade{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
  40%{opacity:.85}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.2)}
}

.finalbox{
  background:#fff8e1;
  border:2px dashed #ffb300;
  border-radius:20px;
  padding:16px;
  margin-top:16px;
}

.small{
  font-size:15px;
  color:#546e7a;
}

@media(max-width:520px){
  .screen{
    padding:10px;
  }

  .card{
    width:94vw;
    padding:16px;
    border-radius:22px;
  }

  h1{
    font-size:28px;
  }

  h2{
    font-size:20px;
  }

  p{
    font-size:16px;
  }

  .topbar{
    grid-template-columns:1fr;
    gap:6px;
  }

  .badge{
    font-size:15px;
    padding:9px 8px;
  }

  .question{
    font-size:20px;
    margin:18px 0 10px;
  }

  .question-image{
    width:220px;
    max-height:180px;
  }

  .option{
    font-size:18px;
    padding:16px;
    min-height:64px;
  }

  button{
    width:100%;
    font-size:18px;
    padding:15px 18px;
  }

  .feedback{
    font-size:17px;
  }

  .explain{
    font-size:15px;
  }
}

@media(max-height:520px){
  .active{
    align-items:flex-start;
  }

  .screen{
    padding-top:10px;
  }

  .card{
    margin:8px 0;
  }

  .question{
    margin:14px 0;
  }

  .option{
    min-height:54px;
    padding:13px;
  }
}

@media(prefers-reduced-motion:reduce){
  .bg span,
  .star,
  .cross{
    animation:none;
  }
}
</style>
</head>

<body>

<div class="bg">
  <span>⭐</span>
  <span>🎈</span>
  <span>⭐</span>
  <span>〰️</span>
  <span>⭐</span>
</div>

<div id="splash" class="screen active">
  <div class="card">
    <img src="assets/innovine-logo.png" class="logo" alt="Innovine Logo" loading="eager" decoding="async">
    <h2>Loading your game...</h2>
  </div>
</div>

<div id="intro" class="screen">
  <div class="card">
    <h1>Me and My Body</h1>
    <h2>Grade 1 EVS</h2>
    <p>Answer the questions. You get one retry after a wrong answer.</p>
    <p>Each question has a 60-second timer.</p>
    <button onclick="startGame()">Start Game</button>
  </div>
</div>

<div id="quiz" class="screen">
  <div class="card">
    <div class="topbar">
      <div class="badge" id="qCount">Question 1/20</div>
      <div class="badge">Score: <span id="score">0</span></div>
      <div class="badge timer">Time: <span id="time">60</span>s</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="question" id="question"></div>
    <div class="question-image-wrap hidden" id="questionImageWrap">
      <img id="questionImage" class="question-image" alt="Question picture" loading="eager" decoding="async">
    </div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button id="nextBtn" class="hidden" onclick="nextQuestion()">Next</button>
  </div>
</div>

<div id="result" class="screen">
  <div class="card">
    <h1>Great Work!</h1>
    <h2>Your Score: <span id="finalScore"></span>/20</h2>
    <p id="resultMsg"></p>
    <button onclick="location.reload()">Play Again</button>
  </div>
</div>

<div class="confetti" id="confetti"></div>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/clapping.mp3" preload="auto"></audio>

<script>
let questions=[
{num:1,q:"Riya hears her teacher calling her. What helps her hear?",o:["Eyes","Ears","Nose","Hands"],a:1,e:"We hear sounds with our ears."},
{num:2,q:"Aman smells a flower. What helps him smell?",o:["Tongue","Eyes","Nose","Skin"],a:2,e:"We smell things with our nose."},
{num:3,q:"Meena eats an apple and says it is sweet. What helps her know this?",o:["Nose","Tongue","Eyes","Ears"],a:1,e:"We taste food with our tongue."},
{num:4,q:"Rohit touches ice and says, “It is cold!” What helps him feel this?",o:["Eyes","Skin","Nose","Ears"],a:1,e:"Our skin helps us feel hot, cold, hard, and soft things."},
{num:5,q:"Sam is reading a book. What helps him read?",o:["Ears","Nose","Eyes","Hands"],a:2,e:"We use our eyes to see and read."},
{num:6,q:"Ravi closes his eyes. What can he NOT do now?",o:["Smell food","Hear sounds","See things","Taste food"],a:2,e:"When eyes are closed, we cannot see things clearly."},
{num:7,q:"You hear a school bell ringing. What helps you hear it?",o:["Eyes","Skin","Ears","Tongue"],a:2,e:"Ears help us hear sounds like a bell."},
{num:8,q:"Neha touches a hot cup and quickly leaves it. Why?",o:["She saw it","She felt it was hot","She smelled it","She heard it"],a:1,e:"Skin helps us feel if something is hot."},
{num:9,q:"You touch a stone and say, “It is hard.” What helps you know this?",o:["Eyes","Nose","Skin","Ears"],a:2,e:"Skin helps us feel if something is hard or soft."},
{num:10,q:"Arjun wants to check if milk smells bad. What should he use?",o:["Eyes","Nose","Skin","Hands"],a:1,e:"The nose helps us smell good and bad smells."},
{num:11,q:"You hear your friend calling you from behind. What helps you know this?",o:["Eyes","Ears","Nose","Tongue"],a:1,e:"Ears help us hear someone calling."},
{num:12,q:"You close your nose. What can you NOT do properly?",o:["See","Hear","Smell","Touch"],a:2,e:"The nose helps us smell."},
{num:13,q:"It is dark and you cannot see anything. Which part is not helping you now?",o:["Nose","Tongue","Eyes","Skin"],a:2,e:"Eyes need light to see clearly."},
{num:14,q:"Karan eats a lemon and makes a sour face. What helps him taste it?",o:["Eyes","Nose","Tongue","Skin"],a:2,e:"The tongue helps us taste sweet, sour, salty, and bitter things."},
{num:15,q:"Riya touches a hot pan and quickly pulls her hand away. Why?",o:["She heard it","She saw it","She felt it was hot","She smelled it"],a:2,e:"Skin helps us feel heat and keeps us safe."},
{num:16,q:"Riya has curly hair. Sia has straight hair. What do we learn?",o:["Everyone looks the same","People can look different","Only boys look different","Only girls look different"],a:1,e:"People can look different from one another."},
{num:17,q:"You are listening to your favourite song. How do you enjoy it?",o:["By seeing","By hearing with ears","By smelling","By touching"],a:1,e:"We enjoy songs by hearing them with our ears."},
{num:18,q:"You touch a soft toy and say, “It is soft.” What helps you know this?",o:["Eyes","Nose","Skin","Tongue"],a:2,e:"Skin helps us feel soft things."},
{num:19,q:"Find the wrong match.",o:["Eyes – See","Ears – Hear","Nose – Taste","Tongue – Taste"],a:2,e:"Nose helps us smell, not taste."},
{num:20,q:"Ravi is blindfolded and asked to touch and guess objects. What is he using the most?",o:["Eyes","Nose","Skin","Ears"],a:2,e:"When blindfolded, he uses his skin to feel the objects."}
];

const imageMap={
  2:"assets/ch1_q2.png",
  5:"assets/ch1_q5.png",
  14:"assets/ch1_q14.png",
  20:"assets/ch1_q20.png"
};

let current=0;
let score=0;
let attempts=0;
let timer;
let timeLeft=60;
let locked=false;

const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");

setTimeout(function(){
  showScreen("intro");
},5000);

function showScreen(id){
  const screens=document.querySelectorAll(".screen");
  for(let i=0;i<screens.length;i++){
    screens[i].classList.remove("active");
  }
  document.getElementById(id).classList.add("active");
}

function startGame(){
  questions=shuffleQuestions(questions);
  score=0;
  current=0;
  showScreen("quiz");
  loadQuestion();
}

function loadQuestion(){
  locked=false;
  attempts=0;
  clearInterval(timer);
  timeLeft=60;

  document.getElementById("time").textContent=timeLeft;
  document.getElementById("score").textContent=score;
  document.getElementById("qCount").textContent="Question "+(current+1)+"/"+questions.length;
  document.getElementById("question").textContent=questions[current].q;

  const imageWrap=document.getElementById("questionImageWrap");
  const image=document.getElementById("questionImage");
  const imagePath=imageMap[questions[current].num];

  if(imagePath){
    image.src=imagePath;
    image.alt="Picture for question "+questions[current].num;
    imageWrap.classList.remove("hidden");
  }else{
    image.removeAttribute("src");
    image.alt="";
    imageWrap.classList.add("hidden");
  }

  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").classList.add("hidden");

  const progress=((current)/questions.length)*100;
  document.getElementById("progressBar").style.width=progress+"%";

  const box=document.getElementById("options");
  box.innerHTML="";

  for(let i=0;i<questions[current].o.length;i++){
    const div=document.createElement("div");
    div.className="option";
    div.textContent=questions[current].o[i];
    div.onclick=function(){
      checkAnswer(i,div);
    };
    box.appendChild(div);
  }

  startTimer();
}

function startTimer(){
  timer=setInterval(function(){
    timeLeft--;
    document.getElementById("time").textContent=timeLeft;

    if(timeLeft<=0){
      clearInterval(timer);
      showAnswer("Time is up!");
    }
  },1000);
}

function checkAnswer(i,el){
  if(locked){
    return;
  }

  const q=questions[current];

  if(i===q.a){
    locked=true;
    clearInterval(timer);
    score++;
    document.getElementById("score").textContent=score;
    el.classList.add("correct");
    document.getElementById("feedback").innerHTML="Correct!<div class='explain'>"+q.e+"</div>";

    playSound(correctSound);
    setTimeout(function(){
      playSound(clapSound);
    },250);

    makeConfetti();
    document.getElementById("nextBtn").classList.remove("hidden");
  }else{
    attempts++;
    el.classList.add("wrong");
    showCross();
    playSound(wrongSound);

    if(attempts===1){
      document.getElementById("feedback").innerHTML="Try once more.";
      el.onclick=null;
    }else{
      showAnswer("Not quite.");
    }
  }
}

function showAnswer(msg){
  locked=true;
  clearInterval(timer);

  const q=questions[current];
  const options=document.querySelectorAll(".option");

  for(let i=0;i<options.length;i++){
    options[i].onclick=null;
    if(i===q.a){
      options[i].classList.add("correct");
    }
  }

  document.getElementById("feedback").innerHTML=
    msg+"<div class='explain'>Correct answer: <b>"+q.o[q.a]+"</b><br>"+q.e+"</div>";

  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion(){
  current++;

  if(current<questions.length){
    loadQuestion();
  }else{
    document.getElementById("progressBar").style.width="100%";
    showScreen("finalChallenge");
  }
}

function showResult(){
  showScreen("result");
  document.getElementById("finalScore").textContent=score;

  let msg="Good effort! Keep practising your sense organs.";

  if(score>=18){
    msg="Excellent! You know your body parts very well.";
  }else if(score>=14){
    msg="Well done! A little more practice will make it even better.";
  }

  document.getElementById("resultMsg").textContent=msg;
}

function makeConfetti(){
  const box=document.getElementById("confetti");

  for(let i=0;i<18;i++){
    const s=document.createElement("div");
    s.className="star";
    s.textContent="⭐";
    s.style.left=Math.random()*100+"vw";
    s.style.top=(55+Math.random()*25)+"vh";
    box.appendChild(s);

    setTimeout(function(){
      s.remove();
    },900);
  }
}

function showCross(){
  const x=document.createElement("div");
  x.className="cross";
  x.textContent="✕";
  document.body.appendChild(x);

  setTimeout(function(){
    x.remove();
  },700);
}

function shuffleQuestions(arr){
  const shuffled=arr.slice();

  for(let i=shuffled.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    const temp=shuffled[i];
    shuffled[i]=shuffled[j];
    shuffled[j]=temp;
  }

  return shuffled;
}

function playSound(sound){
  if(!sound){
    return;
  }

  try{
    sound.currentTime=0;
    const playPromise=sound.play();

    if(playPromise!==undefined){
      playPromise.catch(function(){});
    }
  }catch(error){}
}
</script>

</body>
</html>
