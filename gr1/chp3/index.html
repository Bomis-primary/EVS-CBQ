<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>My Family and School</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  overflow-x:hidden;
}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#fff7d6,#e8f5ff,#f3e8ff);
  color:#263238;
}

.bg span{
  position:fixed;
  top:-30px;
  font-size:22px;
  opacity:.22;
  animation:float 14s linear infinite;
  z-index:0;
}

.bg span:nth-child(1){left:8%;animation-delay:0s}
.bg span:nth-child(2){left:28%;animation-delay:3s}
.bg span:nth-child(3){left:52%;animation-delay:6s}
.bg span:nth-child(4){left:76%;animation-delay:2s}
.bg span:nth-child(5){left:92%;animation-delay:5s}

@keyframes float{
  from{transform:translateY(-40px) rotate(0deg)}
  to{transform:translateY(110vh) rotate(180deg)}
}

.screen{
  display:none;
  min-height:100vh;
  padding:16px;
  position:relative;
  z-index:1;
}

.active{
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:92vw;
  max-width:760px;
  background:rgba(255,255,255,.96);
  border-radius:26px;
  padding:22px;
  box-shadow:0 10px 26px rgba(0,0,0,.13);
  text-align:center;
}

.logo{
  width:180px;
  max-width:70%;
  height:auto;
  margin-bottom:18px;
}

h1{
  color:#6a1b9a;
  margin:10px 0;
  font-size:36px;
  line-height:1.15;
}

h2{
  color:#1565c0;
  margin:8px 0;
  font-size:24px;
}

p{
  font-size:18px;
  line-height:1.45;
}

button{
  border:0;
  border-radius:18px;
  padding:15px 24px;
  margin:8px;
  font-size:18px;
  font-weight:bold;
  background:#ffca28;
  color:#263238;
  cursor:pointer;
  box-shadow:0 5px 0 #f9a825;
  min-height:54px;
}

button:active{
  transform:translateY(3px);
  box-shadow:0 2px 0 #f9a825;
}

.topbar{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:14px;
  font-weight:bold;
}

.badge{
  background:#e3f2fd;
  border-radius:16px;
  padding:10px 8px;
  text-align:center;
  font-size:16px;
}

.timer{background:#fff3e0}

.progress-wrap{
  width:100%;
  height:12px;
  background:#e0e0e0;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:16px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#66bb6a;
  transition:.3s;
}

.question-image-container{
  text-align:center;
  margin:10px auto 14px;
  min-height:0;
}

.question-image-container img{
  display:block;
  width:100%;
  max-width:280px;
  max-height:180px;
  object-fit:contain;
  margin:0 auto;
  border-radius:18px;
}

.question{
  font-size:24px;
  line-height:1.4;
  font-weight:bold;
  margin:22px 0;
}

.options{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.option{
  background:#f1f8e9;
  border:2px solid #c5e1a5;
  border-radius:18px;
  padding:18px;
  font-size:20px;
  min-height:70px;
  display:flex;
  align-items:center;
  cursor:pointer;
  text-align:left;
  line-height:1.3;
}

.correct{
  background:#c8f7c5!important;
  border-color:#2e7d32!important;
  transform:scale(1.01);
}

.wrong{
  background:#ffcdd2!important;
  border-color:#c62828!important;
}

.feedback{
  min-height:62px;
  margin-top:16px;
  font-size:18px;
  font-weight:bold;
}

.explain{
  font-size:16px;
  font-weight:normal;
  margin-top:6px;
  line-height:1.4;
}

.hidden{display:none}

.confetti{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:3;
}

.star{
  position:absolute;
  font-size:24px;
  animation:pop 900ms ease-out forwards;
}

@keyframes pop{
  0%{transform:scale(.3) translateY(0);opacity:1}
  100%{transform:scale(1.4) translateY(-120px);opacity:0}
}

.cross{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:88px;
  color:#e53935;
  opacity:0;
  z-index:4;
  animation:crossfade 700ms ease-out;
}

@keyframes crossfade{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
  40%{opacity:.85}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.2)}
}

@media(max-width:520px){
  .screen{padding:10px}
  .card{width:94vw;padding:16px;border-radius:22px}
  h1{font-size:28px}
  h2{font-size:20px}
  p{font-size:16px}
  .topbar{grid-template-columns:1fr;gap:6px}
  .badge{font-size:15px;padding:9px 8px}
  .question{font-size:20px;margin:18px 0}
  .question-image-container img{max-width:260px;max-height:170px}
  .option{font-size:18px;padding:16px;min-height:64px}
  button{width:100%;font-size:18px;padding:15px 18px}
  .feedback{font-size:17px}
  .explain{font-size:15px}
}
</style>
</head>

<body>

<div class="bg">
  <span>⭐</span><span>🏠</span><span>⭐</span><span>🏫</span><span>⭐</span>
</div>

<div id="splash" class="screen active">
  <div class="card">
    <img src="assets/innovine-logo.png" class="logo" alt="Innovine Logo" loading="eager">
    <h2>Loading your game...</h2>
  </div>
</div>

<div id="intro" class="screen">
  <div class="card">
    <h1>My Family and School</h1>
    <h2>Grade 1 EVS</h2>
    <p>Choose the best answer. You get one retry after a wrong answer.</p>
    <p>Each question has a 60-second timer.</p>
    <button onclick="startGame()">Start Game</button>
  </div>
</div>

<div id="quiz" class="screen">
  <div class="card">
    <div class="topbar">
      <div class="badge" id="qCount">Question 1/20</div>
      <div class="badge">Score: <span id="score">0</span></div>
      <div class="badge timer">Time: <span id="time">60</span>s</div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div id="questionImageContainer" class="question-image-container"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button id="nextBtn" class="hidden" onclick="nextQuestion()">Next</button>
  </div>
</div>

<div id="result" class="screen">
  <div class="card">
    <h1>Great Work!</h1>
    <h2>Your Score: <span id="finalScore"></span>/20</h2>
    <p id="resultMsg"></p>
    <button onclick="location.reload()">Play Again</button>
  </div>
</div>

<div class="confetti" id="confetti"></div>

<audio id="correctSound" src="assets/correct.mp3" preload="metadata"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="metadata"></audio>
<audio id="clapSound" src="assets/clapping.mp3" preload="metadata"></audio>

<script>
const questions=[
{q:"Rahul is sad after a difficult day. His mother hugs him and talks to him. What does this show?",o:["Care for family","Fighting","Ignoring","Sleeping"],a:0,e:"Family members care for and help one another."},
{q:"Kabir lives with his parents and his sister. Which people belong to his family?",o:["Parents and children","Big family","Friends","Teachers"],a:0,e:"A family can have parents and children living together."},
{q:"Aman lives with his grandparents, parents, and sister. What type of family does he have?",image:"assets/ch3_q3.png",o:["Small family","Big family","Friends","School group"],a:1,e:"A family with many members like grandparents, parents, and cousins is a big family."},
{q:"Rohan helps his mother by cleaning his room. What is he doing?",o:["Playing","Helping family","Studying","Sleeping"],a:1,e:"Helping at home is a good family habit."},
{q:"Your father is washing the car. What would be a helpful thing for you to do?",o:["Help him","Watch","Go play","Sit"],a:0,e:"We should help our family members when we can."},
{q:"Arjun's grandparents spend time telling him stories every evening. What does this show about grandparents?",o:["Love","Noise","Tiredness","Stopping learning"],a:0,e:"Grandparents show love and care in many ways."},
{q:"Your family is free in the evening. What is a good way to spend time together?",o:["Sit alone","Play together","Fight","Ignore"],a:1,e:"Playing together is a good way for families to spend time."},
{q:"Vihaan's birthday is being celebrated at home. What do families usually do on such a special day?",o:["Ignore it","Celebrate","Stay quiet","Go to school"],a:1,e:"Families often celebrate special days together."},
{q:"Your family is having dinner together. What is a good thing for you to do?",o:["Watch TV","Eat together","Run out","Sleep"],a:1,e:"Eating together is a good family habit."},
{q:"Neel learns reading, writing, and maths every day. Which place is helping him learn these things?",o:["Home","School","Playground","Market"],a:1,e:"We go to school to learn new things."},
{q:"Aditya does not understand a lesson. His teacher explains it again. What does this show about teachers?",o:["Teachers help us learn","Teachers only play","Teachers are not useful","Teachers help us sleep"],a:0,e:"Teachers help us learn and understand better."},
{q:"Karan wants to borrow a storybook and read quietly. Where should he go?",o:["Playground","Library","Bus","Corridor"],a:1,e:"A library has many books for reading."},
{q:"Rahul feels unwell during school. Where should he go for help?",image:"assets/ch3_q13.png",o:["Class","Playground","Medical room","Library"],a:2,e:"The medical room is the right place to go when someone feels sick at school."},
{q:"Kabir wants to play football with his friends. Where should he go?",image:"assets/ch3_q14.png",o:["Library","Playground","Staff room","Office"],a:1,e:"The playground is the right place to play games."},
{q:"Aman is running in the school corridor. What may happen?",o:["He may run fast","He may get hurt","He may learn more","Nothing will happen"],a:1,e:"Running in the corridor is unsafe and can cause injury."},
{q:"While using the stairs at school, what should you do to stay safe?",o:["Run","Walk slowly","Jump","Push"],a:1,e:"We should walk slowly and carefully on stairs."},
{q:"A stranger offers Rohan a chocolate outside school. What should he do?",o:["Take it","Talk to them","Say no","Go with them"],a:2,e:"We should not take things from strangers."},
{q:"Arjun is travelling in a school bus. What is the safest thing for him to do?",o:["Put your hand out","Sit properly","Stand","Move around"],a:1,e:"Sitting properly in the bus keeps us safe."},
{q:"Vihaan meets his teacher in the school corridor. What should he do?",o:["Ignore","Greet","Run","Shout"],a:1,e:"Greeting teachers is a good manner."},
{q:"Neel is sitting in class and listening to the teacher. How should he sit?",o:["Bend","Sit straight","Lie down","Turn around"],a:1,e:"Sitting straight helps us listen and learn better."}
];

let current=0;
let score=0;
let attempts=0;
let timer;
let timeLeft=60;
let locked=false;

const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");

setTimeout(function(){
  showScreen("intro");
},1500);

function showScreen(id){
  document.querySelectorAll(".screen").forEach(function(screen){
    screen.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

function shuffleQuestions(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function startGame(){
  score=0;
  current=0;
  shuffleQuestions(questions);
  showScreen("quiz");
  loadQuestion();
}

function loadQuestion(){
  locked=false;
  attempts=0;
  clearInterval(timer);
  timeLeft=60;

  const q=questions[current];

  document.getElementById("time").textContent=timeLeft;
  document.getElementById("score").textContent=score;
  document.getElementById("qCount").textContent="Question "+(current+1)+"/"+questions.length;
  document.getElementById("question").textContent=q.q;
  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").classList.add("hidden");

  const imageContainer=document.getElementById("questionImageContainer");
  imageContainer.innerHTML="";

  if(q.image){
    const img=document.createElement("img");
    img.src=q.image;
    img.alt="Question image";
    img.loading="eager";
    img.decoding="async";
    imageContainer.appendChild(img);
  }

  document.getElementById("progressBar").style.width=((current)/questions.length)*100+"%";

  const box=document.getElementById("options");
  box.innerHTML="";

  q.o.forEach(function(optionText,i){
    const div=document.createElement("div");
    div.className="option";
    div.textContent=optionText;
    div.onclick=function(){checkAnswer(i,div)};
    box.appendChild(div);
  });

  startTimer();
}

function startTimer(){
  timer=setInterval(function(){
    timeLeft--;
    document.getElementById("time").textContent=timeLeft;

    if(timeLeft<=0){
      clearInterval(timer);
      showAnswer("Time is up!");
    }
  },1000);
}

function checkAnswer(i,el){
  if(locked){return}

  const q=questions[current];

  if(i===q.a){
    locked=true;
    clearInterval(timer);
    score++;
    document.getElementById("score").textContent=score;
    el.classList.add("correct");
    document.getElementById("feedback").innerHTML="Correct!<div class='explain'>"+q.e+"</div>";
    playSound(correctSound);
    setTimeout(function(){playSound(clapSound)},250);
    makeConfetti();
    document.getElementById("nextBtn").classList.remove("hidden");
  }else{
    attempts++;
    el.classList.add("wrong");
    showCross();
    playSound(wrongSound);

    if(attempts===1){
      document.getElementById("feedback").innerHTML="Try once more.";
      el.onclick=null;
    }else{
      showAnswer("Not quite.");
    }
  }
}

function showAnswer(msg){
  locked=true;
  clearInterval(timer);

  const q=questions[current];
  const options=document.querySelectorAll(".option");

  options.forEach(function(option,i){
    option.onclick=null;
    if(i===q.a){
      option.classList.add("correct");
    }
  });

  document.getElementById("feedback").innerHTML=
    msg+"<div class='explain'>Correct answer: <b>"+q.o[q.a]+"</b><br>"+q.e+"</div>";

  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion(){
  current++;

  if(current<questions.length){
    loadQuestion();
  }else{
    document.getElementById("progressBar").style.width="100%";
    showResult();
  }
}

function showResult(){
  showScreen("result");
  document.getElementById("finalScore").textContent=score;

  let msg="Good effort! Keep practising family and school habits.";

  if(score>=18){
    msg="Excellent! You know family, school, safety, and manners very well.";
  }else if(score>=14){
    msg="Well done! A little more practice will make it even better.";
  }

  document.getElementById("resultMsg").textContent=msg;
}

function makeConfetti(){
  const box=document.getElementById("confetti");

  for(let i=0;i<18;i++){
    const s=document.createElement("div");
    s.className="star";
    s.textContent="⭐";
    s.style.left=Math.random()*100+"vw";
    s.style.top=(55+Math.random()*25)+"vh";
    box.appendChild(s);

    setTimeout(function(){
      s.remove();
    },900);
  }
}

function showCross(){
  const x=document.createElement("div");
  x.className="cross";
  x.textContent="✕";
  document.body.appendChild(x);

  setTimeout(function(){
    x.remove();
  },700);
}

function playSound(sound){
  if(!sound){return}

  try{
    sound.currentTime=0;
    const playPromise=sound.play();

    if(playPromise!==undefined){
      playPromise.catch(function(){});
    }
  }catch(error){}
}
</script>

</body>
</html>
